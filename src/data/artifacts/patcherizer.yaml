name: Patcherizer
type: tool
area: Patches & Program Repair
description: >-
  Learns a task-agnostic representation of code changes by fusing the
  surrounding context with two intention-aware encoders — a Transformer over the
  token sequence and a GCN over the AST before/after the change. The learned
  embedding powers three downstream tasks: code-change description
  (commit-message) generation, patch correctness assessment, and change-intention
  detection. Trained on a dataset of 90k parsable code changes.
authors:
  - Xunzhu Tang
  - Haoye Tian
  - Weiguo Pian
  - Saad Ezzini
  - Abdoul Kader Kaboré
  - Andrew Habib
  - Kisub Kim
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
logo: repair
figure: patcherizer.png
figureCaption: Overview of Patcherizer (EMSE 2026 paper, Figure 1)
paper:
  title: "Learning to Represent Code Changes"
  venue: EMSE
  year: 2026
  doi: 10.1007/s10664-025-10763-6
links:
  resources:
    - label: Code and dataset
      url: https://anonymous.4open.science/r/Patcherizer-1E04
tags:
  - code-changes
  - patches
  - representation-learning
  - deep-learning
demo:
  style: terminal
  intro: >-
    Pick a code change. Patcherizer encodes the diff with its sequence-intention
    (Transformer) and graph-intention (GCN) encoders, then feeds the single
    learned representation to three downstream heads: one writes a natural-language
    patch description, one assesses whether the change is correct, and one detects
    the change's intention (add / remove / update).
  outputLabel: Patcherizer output
  countOutput: false
  note: >-
    Precomputed illustrative examples — nothing runs in your browser.
    Patcherizer is a representation-learning model (not an LLM); its real
    pipeline encodes AST diffs and runs the three task-specific heads
    (description, correctness, intention) from the repository.
  scenarios:
    - label: Null-check fix
      query: python patcherizer.py --diff patches/null_check.diff --tasks describe,correctness,intention
      thinking:
        - Parsing the AST diff…
        - Sequence-intention encoding (token stream)…
        - Graph-intention encoding (AST graph)…
        - Fusing into a change representation…
        - Running downstream heads (describe + correctness + intention)…
      output:
        - "Patcherizer — encoding code change (UserService.java)"
        - "Input diff:"
        - "  @@ -42,6 +42,9 @@ public String getName(User user)"
        - "  -    return user.getProfile().getName();"
        - "  +    if (user == null || user.getProfile() == null) {"
        - "  +      return \"\";"
        - "  +    }"
        - "  +    return user.getProfile().getName();"
        - ""
        - "[Task 1] Patch description:"
        - "  Add a null check on the user and its profile before"
        - "  accessing the name, preventing a NullPointerException."
        - ""
        - "[Task 2] Correctness assessment:"
        - "  CORRECT  ✓   (confidence 0.94)"
        - ""
        - "[Task 3] Intention detection:"
        - "  ADD   — introduces a new null-guard block"
      explanation: >-
        The graph-intention encoder sees that a guard now dominates the
        dereference, so the description names the intent — a null check — rather
        than just echoing the added tokens, and the correctness head rates the
        fix as sound.
    - label: Off-by-one fix
      query: python patcherizer.py --diff patches/off_by_one.diff --tasks describe,correctness,intention
      thinking:
        - Parsing the AST diff…
        - Sequence-intention encoding (token stream)…
        - Graph-intention encoding (AST graph)…
        - Fusing into a change representation…
        - Running downstream heads (describe + correctness + intention)…
      output:
        - "Patcherizer — encoding code change (RingBuffer.java)"
        - "Input diff:"
        - "  @@ -18 +18 @@ void drain()"
        - "  -    for (int i = 0; i <= size; i++) {"
        - "  +    for (int i = 0; i < size; i++) {"
        - ""
        - "[Task 1] Patch description:"
        - "  Fix an off-by-one error in the loop bound so iteration"
        - "  stops before the end of the buffer."
        - ""
        - "[Task 2] Correctness assessment:"
        - "  CORRECT  ✓   (confidence 0.91)"
        - ""
        - "[Task 3] Intention detection:"
        - "  UPDATE   — modifies an existing loop bound"
      explanation: >-
        A one-character change (<= becomes <) carries a precise intent.
        Patcherizer's representation captures the boundary shift and produces a
        description an analyst could drop straight into a commit message.
    - label: Overfitting APR patch
      query: python patcherizer.py --diff patches/apr_candidate.diff --tasks describe,correctness,intention
      thinking:
        - Parsing the AST diff…
        - Sequence-intention encoding (token stream)…
        - Graph-intention encoding (AST graph)…
        - Fusing into a change representation…
        - Running downstream heads (describe + correctness + intention)…
      output:
        - "Patcherizer — encoding code change (Discount.java)"
        - "Input diff (auto-generated by an APR tool):"
        - "  @@ -12,2 +12,3 @@ double finalPrice(double price)"
        - "  +    if (price == 100) return 85;   // makes the failing test pass"
        - "       return price * rate;"
        - ""
        - "[Task 1] Patch description:"
        - "  Special-case a price of 100 to return 85, matching the"
        - "  failing test's expected value."
        - ""
        - "[Task 2] Correctness assessment:"
        - "  INCORRECT  ✗   overfitting  (confidence 0.88)"
        - ""
        - "[Task 3] Intention detection:"
        - "  ADD   — inserts a special-case branch"
      explanation: >-
        The patch passes the failing test but hardcodes one input — a classic
        overfitting fix from automated program repair. Patcherizer's correctness
        head flags it as incorrect, exactly the kind of plausible-but-wrong patch
        this task is meant to catch.
    - label: Resource-leak fix
      query: python patcherizer.py --diff patches/resource_leak.diff --tasks describe,correctness,intention
      thinking:
        - Parsing the AST diff…
        - Sequence-intention encoding (token stream)…
        - Graph-intention encoding (AST graph)…
        - Fusing into a change representation…
        - Running downstream heads (describe + correctness + intention)…
      output:
        - "Patcherizer — encoding code change (FileLoader.java)"
        - "Input diff:"
        - "  @@ -25,3 +25,3 @@ byte[] load(String path)"
        - "  -    FileInputStream in = new FileInputStream(path);"
        - "  -    byte[] data = in.readAllBytes();"
        - "  -    return data;"
        - "  +    try (FileInputStream in = new FileInputStream(path)) {"
        - "  +      return in.readAllBytes();"
        - "  +    }"
        - ""
        - "[Task 1] Patch description:"
        - "  Wrap the file stream in a try-with-resources block so it"
        - "  is always closed, fixing a resource leak."
        - ""
        - "[Task 2] Correctness assessment:"
        - "  CORRECT  ✓   (confidence 0.89)"
        - ""
        - "[Task 3] Intention detection:"
        - "  UPDATE   — restructures the resource handling"
      explanation: >-
        The change restructures control flow rather than adding a line. The
        graph-intention encoder recognises the try-with-resources pattern and
        the description states the fixed defect — a resource leak — instead of
        merely listing the edited statements.
