demo:
  style: terminal
  intro: >-
    Pick a code change to preview a simulated pass through Patcherizer's shared
    representation and three downstream tasks: change description, patch
    correctness assessment, and change-intention detection.
  outputLabel: Mock Patcherizer output
  countOutput: false
  note: >-
    Interactive simulation only — no model runs in the browser. Diffs, generated
    descriptions, confidence values, correctness labels, and intention labels
    are fictional examples of the three tasks, not predictions or evaluation
    results from the paper.
  scenarios:
    - label: Add a null guard
      query: patcherizer --diff mocks/null_guard.diff --tasks description,correctness,intention
      thinking:
        - Parsing the before/after ASTs…
        - Encoding the token sequence with the intention-aware Transformer…
        - Encoding graph changes with the GCN…
        - Fusing both views and running three mock task heads…
      output:
        - "file: UserService.java"
        - "- return user.getProfile().getName();"
        - "+ if (user == null || user.getProfile() == null) return \"\";"
        - "+ return user.getProfile().getName();"
        - ""
        - "description  add a guard before dereferencing the user profile"
        - "correctness  CORRECT · mock confidence 0.94"
        - "intention    ADD · introduces a conditional block"
      explanation: >-
        The simulated graph view captures that the new condition dominates the
        dereference, while the sequence view retains the concrete null-check
        vocabulary used by the generated description.
    - label: Fix an off-by-one loop
      query: patcherizer --diff mocks/loop_bound.diff --tasks description,correctness,intention
      thinking:
        - Parsing a one-token relational-operator update…
        - Encoding its surrounding loop context…
        - Combining sequence and AST-change representations…
        - Producing mock outputs for all downstream tasks…
      output:
        - "file: RingBuffer.java"
        - "- for (int i = 0; i <= size; i++) {"
        - "+ for (int i = 0; i < size; i++) {"
        - ""
        - "description  stop iteration before the end of the buffer"
        - "correctness  CORRECT · mock confidence 0.91"
        - "intention    UPDATE · modifies an existing condition"
      explanation: >-
        This fictional example shows the representation preserving a precise
        boundary change even though the textual diff is only one character.
    - label: Flag an overfitting patch
      query: patcherizer --diff mocks/apr_candidate.diff --tasks description,correctness,intention
      thinking:
        - Loading an automatically generated candidate patch…
        - Encoding its branch structure and literal values…
        - Comparing the change representation with mock correctness signals…
        - Producing a triage label and explanation…
      output:
        - "file: Discount.java"
        - "+ if (price == 100) return 85;  // candidate generated for one failing test"
        - "  return price * rate;"
        - ""
        - "description  special-case one price to match an expected value"
        - "correctness  INCORRECT / OVERFITTING · mock confidence 0.88"
        - "intention    ADD · inserts a special-case branch"
      explanation: >-
        The simulated correctness head treats the hard-coded branch as a likely
        test-specific patch. The verdict is a mock, but it makes the
        patch-assessment task tangible for visitors.
