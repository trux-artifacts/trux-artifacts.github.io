name: Patcherizer
type: tool
area: Patches & Program Repair
description: >-
  Learns a task-agnostic representation of code changes by fusing the
  surrounding context with two intention-aware encoders — a Transformer over the
  token sequence and a GCN over the AST before/after the change. The learned
  embedding powers three downstream tasks: code-change description
  (commit-message) generation, patch correctness assessment, and change-intention
  detection. Trained on a dataset of 90k parsable code changes.
authors:
  - Xunzhu Tang
  - Haoye Tian
  - Weiguo Pian
  - Saad Ezzini
  - Abdoul Kader Kaboré
  - Andrew Habib
  - Kisub Kim
