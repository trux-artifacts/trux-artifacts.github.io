demo:
  style: terminal
  intro: >-
    Preview two experiment entry points documented by the public Patcherizer
    implementation: code-change description generation and patch correctness
    assessment.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    Documentation preview only — these commands are not executed in the
    browser and no confidence scores are simulated. The public implementation
    documents these two tasks; the final journal paper additionally evaluates
    code-change intention detection.
  scenarios:
    - label: Description-generation evaluation
      query: |-
        cd PatchDescriptionGeneration
        sh evaluate_all_models.sh
      thinking:
        - Showing the documented evaluation entry point; no model is run.
      output:
        - "Evaluate the description-generation models distributed by the implementation."
        - "The required datasets and pretrained/fine-tuned files are linked from the repository's Zenodo resources."
      explanation: >-
        This workflow evaluates natural-language descriptions generated from
        the learned code-change representation.
    - label: Patch-correctness assessment
      query: |-
        cd PatchCorrectness
        python main.py
      thinking:
        - Showing the documented experiment entry point; no model is run.
      output:
        - "Run the patch-correctness experiment with the configured ASE feature dataset."
        - "Update PatchCorrectness/config_correctness.py with the downloaded feature path first."
      explanation: >-
        The repository explicitly requires the external correctness features
        linked from Zenodo before this experiment can be reproduced.
