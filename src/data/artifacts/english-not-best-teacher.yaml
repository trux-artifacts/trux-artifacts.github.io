name: When English Isn't the Best Teacher
type: dataset
area: Multilingual NLP & LLMs
description: >-
  A broad empirical study of cross-lingual in-context learning (ICL): across 7
  tasks, 6 LLMs and 18 typologically diverse languages, it asks which source
  language best teaches a given target language in-context. It overturns
  fine-tuning intuitions — English is often the worst teacher, a target language
  is rarely its own best source, and low-resource, non-Latin-script languages
  turn out to be the most effective sources.
authors:
  - Fred Philippy
  - Siwen Guo
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: stable
logo: llm
figure: english-not-best-teacher.png
figureCaption: Donor vs recipient capability across languages — strong targets (e.g. English) are weak sources, and low-resource languages are strong sources (paper, Figure 3)
paper:
  title: "When English Isn't the Best Teacher: Source Language Effects in Cross-Lingual In-Context Learning"
  venue: MeLLM @ ACL
  year: 2026
  url: https://aclanthology.org/2026.mellm-1.31/
tags:
  - llm
  - in-context-learning
  - multilingual
  - cross-lingual-transfer
  - nlp
