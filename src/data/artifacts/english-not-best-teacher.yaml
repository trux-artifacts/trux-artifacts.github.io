    - "English is the worst source language in ~16% of experiments"
    - "Strong target languages tend to be weak source languages (r = −0.932)"
    - "Linguistic similarity does NOT predict ICL transfer — unlike fine-tuning"
    - "A model's internal cross-lingual alignment predicts transfer better than similarity"
    - "Low-resource, non-Latin-script languages make the most effective sources"
    - "High-resource Latin-script languages are the least effective sources"
    - "Language confusion is a distinct challenge, not just unequal transfer"
