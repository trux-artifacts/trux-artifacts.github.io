demo:
  intro: >-
    AppComplianceLLM checks whether an Android app satisfies a privacy
    requirement straight from its Smali bytecode — no source code, no privacy
    policy. It fills a zero-shot prompt with the requirement plus a method's
    Smali and asks the LLM for a binary YES/NO answer with an explanation. Here
    the requirement is R1 (GDPR Article 17, "Right to Erasure"): "The user shall
    be able to delete their account". Pick a method to see the LLM's verdict —
    including the real false positives.
  outputLabel: Analyzed method (Smali)
  countOutput: false
  note: >-
    Real LLM answers reproduced from the paper's experiments on RegApp (the
    authors' demo app) and WordPress (10M+ downloads); the two false-positive
    wordings are illustrative. This is an exploratory proof of concept — nothing
    runs in your browser and no model is called. Run it from the repository
    (apktool + Ollama / Llama-3.1 8B).
  scenarios:
    - label: RegApp · account deletion
      query: 'RegApp — check MyAccountFragment.delete() against R1 (right to erasure)'
      thinking:
        - Decompiling the APK with apktool…
        - Restructuring Smali into classes & methods (192 classes → 1388 methods)…
        - Filtering system & third-party libraries…
        - Filling the zero-shot prompt (requirement + method Smali)…
        - Querying the LLM (Llama-3.1 8B)…
      output:
        - 'method: com.example.regapp.MyAccountFragment->delete()'
        - '  invoke-virtual {v2}, Lcom/google/firebase/auth/FirebaseUser;->delete()Lcom/google/android/gms/tasks/Task;'
        - '  invoke-virtual {v3, v4}, ...->addOnCompleteListener(...)   # handles the deletion result'
      verdictAnswer: "LLM answer: YES"
      verdictLabel: True positive
      verdictKind: correct
      explanation: >-
        LLM answer (verbatim): "YES. The method is designed to delete a user's
        account when the reauthTask is successful. The code calls 'delete()' on
        the FirebaseUser instance, which is then passed to an OnCompleteListener
        to handle the deletion task. This suggests that the method's primary
        purpose is to enable the deletion of a user's account." — one of the two
        methods that genuinely implement account deletion in RegApp. A correct
        detection.
    - label: RegApp · logout (FP)
      query: 'RegApp — check MainActivity.onOptionsItemSelected() against R1 (right to erasure)'
      thinking:
        - Decompiling the APK with apktool…
        - Restructuring Smali into classes & methods (192 classes → 1388 methods)…
        - Filtering system & third-party libraries…
        - Filling the zero-shot prompt (requirement + method Smali)…
        - Querying the LLM (Llama-3.1 8B)…
      output:
        - 'method: com.example.regapp.MainActivity->onOptionsItemSelected(MenuItem)'
        - '  const v1, 0x7f0a00e3   # R.id.nav_log_out'
        - '  invoke-virtual {v2}, Lcom/google/firebase/auth/FirebaseAuth;->signOut()V'
      verdictAnswer: "LLM answer: YES"
      verdictLabel: False positive
      verdictKind: incorrect
      explanation: >-
        LLM answer (verbatim): "YES, The Smali code includes a condition where
        the Firebase Authentication service is signed out when a specific menu
        item (nav_log_out) is clicked. This is clear evidence that this method
        enables the deletion of a user's account, which matches your objective."
        — but this method only signs the user out; it deletes nothing. A false
        positive: the model confuses logging out with account deletion.
    - label: WordPress · deletion
      query: 'WordPress — check the account-settings onClick() against R1 (right to erasure)'
      thinking:
        - Decompiling the APK with apktool…
        - Restructuring Smali into classes & methods (380 classes → 1296 methods)…
        - Filtering system & third-party libraries…
        - Filling the zero-shot prompt (requirement + method Smali)…
        - Querying the LLM (Llama-3.1 8B)…
      output:
        - 'method: org.wordpress.android.ui.accounts.-> onClick(View)'
        - '  invoke-static {v0, v1}, Lorg/wordpress/android/models/WordPressDB;->deleteAccount(Landroid/content/Context;Ljava/lang/String;)Z'
        - '  # on success: toast + finish() ;  else: alert dialog'
      verdictAnswer: "LLM answer: YES"
      verdictLabel: True positive
      verdictKind: correct
      explanation: >-
        LLM answer (verbatim): "YES. The method onClick calls
        WordPressDB.deleteAccount, which is a clear indication that the
        functionality is related to account deletion. The method passes context
        and a string (likely identifying the account) to this function, which
        returns a boolean indicating success. If the deletion is successful, a
        toast is shown, and the current activity is finished. If not, an alert
        dialog is shown to the user […]. This demonstrates a method that handles
        account deletion." — confirmed by manual inspection (the authors
        installed the app and deleted a real account). A true positive on a
        real-world app with 10M+ downloads.
    - label: WordPress · IntHashMap (FP)
      query: 'WordPress — check IntHashMap.remove(int) against R1 (right to erasure)'
      thinking:
        - Decompiling the APK with apktool…
        - Restructuring Smali into classes & methods (380 classes → 1296 methods)…
        - Filtering system & third-party libraries…
        - Filling the zero-shot prompt (requirement + method Smali)…
        - Querying the LLM (Llama-3.1 8B)…
      output:
        - 'method: org.wordpress.android.util.IntHashMap->remove(I)Ljava/lang/Object;'
        - '  # custom hash-map entry removal — no account data involved'
      verdictAnswer: "LLM answer: YES"
      verdictLabel: False positive
      verdictKind: incorrect
      explanation: >-
        LLM answer: "YES. The remove method deletes an entry identified by its
        key, which points to removal of stored user data as required for account
        deletion." — in reality this is a custom IntHashMap data-structure
        implementation with nothing to do with accounts; the word "remove"
        misleads the model. A false positive (wording illustrative; the paper
        reports this method among WordPress's false positives).
