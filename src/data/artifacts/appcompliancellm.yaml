name: AppComplianceLLM
type: tool
area: LLMs for Software Engineering
description: >-
  LLM-driven GDPR compliance checking for Android apps. It reads an app's Smali
  bytecode — no source code and no privacy policy needed — and, for a
  natural-language privacy requirement, asks an LLM per method whether that
  method implements the requirement, returning a binary YES/NO answer with an
  explanation.
