name: How Secure is Secure Code Generation?
type: benchmark
area: LLMs for Software Engineering
logo: llm
description: >-
  An auditing framework that stress-tests secure code generation methods
  (SVEN, SafeCoder, PromSec) with adversarial prompt perturbations,
  evaluating security and functionality jointly.
authors:
  - Melissa Tessa
  - Iyiola E. Olatunji
  - Aicha War
  - Jacques Klein
  - Tegawendé F. Bissyandé
addedAt: '2026-07-07'
figure: secure-code-generation.png
figureCaption: Secure code generation audit pipeline (paper, Figure 1)
paper:
  title: "How Secure is Secure Code Generation? Adversarial Prompts Put LLM Defenses to the Test"
  venue: arXiv
  year: 2026
  url: https://arxiv.org/abs/2601.07084
tags:
  - llm
  - secure-code-generation
  - adversarial
  - security
demo:
  style: llm
  engineLabel: Secure-code audit pipeline
  inputLabel: Developer prompt
  intro: >-
    Choose a fictional secure-code request to preview the audit pipeline. Each
    mock generation is checked by static analyzers, an LLM reviewer, and
    executable tests before receiving a joint security-and-functionality
    verdict.
  outputLabel: Mock consensus audit
  countOutput: false
  note: >-
    Interactive simulation only — no code is generated, scanned, or executed in
    the browser. Prompts, programs, detector findings, test counts, scores, and
    verdicts are fictional examples of the evaluation protocol and are not
    results from the paper or any named defense.
  scenarios:
    - label: Parameterize a user lookup
      query: "Generate a Python function that loads a user by email from SQLite."
      thinking:
        - Generating a fictional candidate implementation…
        - Running the mock CodeQL and Bandit checks…
        - Asking the simulated LLM reviewer for an independent assessment…
        - Executing functional and injection-resistance tests…
      output:
        - "generated: cursor.execute(\"SELECT * FROM users WHERE email = ?\", (email,))"
        - "CodeQL   PASS · no concatenated query path"
        - "Bandit   PASS · no high-confidence finding"
        - "Reviewer PASS · parameter binding separates data from SQL"
        - "Tests    12/12 functional · 4/4 security cases"
      verdictAnswer: SECURE + FUNCTIONAL
      verdictLabel: Mock unanimous consensus
      verdictKind: correct
      explanation: >-
        All fictional evaluators agree and the tests pass, so this candidate
        reaches the strongest mock verdict. It illustrates why functionality is
        checked alongside security.
    - label: Catch string-built SQL
      query: "Write the same lookup, but keep it short and avoid helper libraries."
      thinking:
        - Generating a second fictional candidate…
        - Scanning its data flow into the database API…
        - Comparing static and semantic reviewer findings…
        - Running normal and adversarial test inputs…
      output:
        - "generated: cursor.execute(\"SELECT * FROM users WHERE email='\" + email + \"'\")"
        - "CodeQL   FAIL · user-controlled value reaches SQL string"
        - "Bandit   WARN · dynamically constructed query"
        - "Reviewer FAIL · input is not parameterized"
        - "Tests    12/12 functional · 1/4 security cases"
      verdictAnswer: INSECURE
      verdictLabel: Mock consensus rejection
      verdictKind: incorrect
      explanation: >-
        The implementation behaves correctly for ordinary inputs but violates
        the requested security property. The mock consensus therefore rejects
        it despite a perfect functional-test score.
    - label: Detect a safe-looking stub
      query: "Generate a secure file-download handler confined to /srv/public."
      thinking:
        - Generating a candidate with defensive-looking checks…
        - Scanning path normalization and containment logic…
        - Running the LLM review and security cases…
        - Verifying that valid downloads still work…
      output:
        - "generated: if not resolved.is_relative_to(ROOT) or resolved.parent != ROOT: return 403"
        - "CodeQL   PASS · containment check observed"
        - "Bandit   PASS · no path-traversal finding"
        - "Reviewer PASS · normalized path remains under root"
        - "Tests    3/10 functional · 5/5 security cases"
      verdictAnswer: NON-FUNCTIONAL
      verdictLabel: Mock consensus rejection
      verdictKind: incorrect
      explanation: >-
        This fictional candidate confines downloads to direct children of the
        root and therefore rejects valid nested files.
        The demo makes the paper's core distinction visible: security checks do
        not compensate for broken functionality.
