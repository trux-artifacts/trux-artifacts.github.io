name: GapFuzz
type: tool
area: Networking & Fuzzing
description: >-
  A stateful concurrency fuzzer that uncovers cross-plane divergences in
  distributed SDN controllers — cases where a controller's control-plane view
  disagrees with the actual data-plane (switch) state. GapFuzz injects
  contradictory flow rules against a real ONOS cluster and uses a native switch
  oracle to catch divergences, finding them in 81.7% of runs, most of which
  persist well past 30 seconds.
authors:
  - Moustapha Awwalou Diouf
  - Samuel Ouya
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: stable
logo: network
tags:
  - sdn
  - fuzzing
  - distributed-systems
  - networking
  - testing
paper:
  title: "GapFuzz: Cross-Plane Divergence Fuzzing for Distributed SDN Controllers"
  venue: Internetware
  year: 2026
  url: https://conf.researchr.org/details/internetware-2026/internetware-2026-research-track/46/GapFuzz-Cross-Plane-Divergence-Fuzzing-for-Distributed-SDN-Controllers
links:
  github: https://github.com/mad975/GapFuzz
demo:
  style: terminal
  intro: >-
    Launch a short GapFuzz campaign, inject concurrent contradictory flow
    operations, and watch the control-plane view diverge from the native switch
    oracle. Choose a scenario to replay a representative trace.
  outputLabel: GapFuzz trace
  countOutput: false
  note: >-
    Interactive simulation — the command-shaped interface, seeds, timings, and
    per-run traces below are plausible mock outputs; no ONOS cluster is executed
    in the browser. Aggregate rates shown elsewhere on this page come from the
    paper and replication package.
  scenarios:
    - label: ADD ↔ DELETE race
      query: gapfuzz run --template add-delete --seed 4182 --duration 60s
      thinking:
        - Connecting to the three-node ONOS cluster…
        - Scheduling contradictory ADD and DELETE operations…
        - Polling both the controller view and native switch state…
      output:
        - "[00:00.000] seed=4182  template=ADD↔DELETE  target=of:0000000000000001"
        - "[00:00.005] control-plane: flow=absent"
        - "[00:00.005] switch-oracle: flow=installed  action=OUTPUT:2"
        - "[DIVERGENCE] cross-plane mismatch detected  Δt=5 ms"
        - "[00:30.000] status=persistent"
      explanation: >-
        This mock trace illustrates GapFuzz's central oracle: a flow can remain
        installed on the switch even though the distributed controller reports
        that it has been removed.
    - label: MODIFY ↔ DELETE race
      query: gapfuzz run --template modify-delete --seed 9031 --duration 60s
      thinking:
        - Installing a baseline forwarding rule…
        - Racing a priority update against deletion on different controller nodes…
        - Comparing the converged controller state with the switch table…
      output:
        - "[00:00.000] seed=9031  template=MODIFY↔DELETE  priority=40000→50000"
        - "[00:10.240] control-plane: flow=absent"
        - "[00:10.240] switch-oracle: priority=50000  action=DROP"
        - "[DIVERGENCE] mismatch detected  Δt=10.24 s"
        - "[00:30.000] status=persistent"
      explanation: >-
        The simulated 10.24-second window mirrors the upper timing regime
        studied in the paper while keeping the individual trace explicitly
        illustrative.
    - label: Native-oracle ablation
      query: gapfuzz replay --seed 2718 --compare-oracles
      thinking:
        - Replaying the same concurrent event schedule…
        - Evaluating it first from the controller view alone…
        - Re-evaluating it against the native switch oracle…
      output:
        - "[controller-only] verdict=CONSISTENT  reported_flows=0"
        - "[native-switch]  verdict=DIVERGENT   installed_flows=1"
        - "[delta] hidden cross-plane mismatch recovered by native oracle"
        - "[paper context] removing the native oracle lowers campaign hit rate by up to 46.5 points"
      explanation: >-
        A controller-only check can miss the exact failure GapFuzz targets. The
        final line is the paper's aggregate ablation result; the replay itself
        is a simulated example.
dataset:
  stats:
    - value: 81.7
      animate: false
      suffix: "%"
      label: Runs that trigger a cross-plane divergence (N=50)
    - value: 99.4
      suffix: "%"
      label: Divergences persisting past 30 seconds
    - value: 7
      label: Contradictory-flow templates
    - value: 10.24
      animate: false
      suffix: " s"
      label: Upper divergence window (Δt_max)
    - value: 46.5
      animate: false
      suffix: " pt"
      label: Hit-rate drop without the native oracle
    - value: 50
      label: Fuzzing runs per campaign
  sampleTitle: Key findings
  sampleCount: 4
  sampleNote: >-
    Headline results from the replication package (hit shuffle for more), all
    reproducible from the released JSONL campaign data.
  samples:
    - "81.7% of runs trigger a cross-plane divergence (95% CI 77.3–85.4%)"
    - "99.4% of divergences persist past 30 seconds — they are not transient"
    - "Δt_max is bimodal: it collapses to either 5 ms or 10.24 s"
    - "Removing the native switch oracle drops the hit rate by up to 46.5 points"
    - "7 contradictory-flow templates drive each fuzzing campaign"
    - "Evaluated on a real ONOS cluster (Atomix, OVS, Mininet, Ryu companion)"
  usage:
    title: Reproduce the results
    note: The released JSONL campaign data reproduces the paper's tables in about five minutes.
    code: |
      python -m venv venv && source venv/bin/activate
      pip install -r requirements.txt
      python analysis/compute_stats.py
