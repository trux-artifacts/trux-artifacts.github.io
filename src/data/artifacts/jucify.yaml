name: JuCify
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Unifies Android bytecode and native code into a single representation so
  static analyzers can see the whole app — revealing sensitive flows that
  cross the Java/native boundary.
authors:
  - Jordan Samhi
  - Jun Gao
  - Nadia Daoudi
  - Pierre Graux
  - Henri Hoyez
  - Xiaoyu Sun
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
addedAt: '2026-07-06'
figure: jucify.png
figureCaption: Overview of the JuCify approach, from the angle of call-graph construction (ICSE 2022 paper, Figure 2)
paper:
  title: "JuCify: A Step Towards Android Code Unification for Enhanced Static Analysis"
  venue: ICSE
  year: 2022
  doi: 10.1145/3510003.3512766
links:
  github: https://github.com/JordanSamhi/JuCify
tags:
  - android
  - native-code
  - static-analysis
  - call-graph
demo:
  style: terminal
  intro: >-
    Pick a cross-language flow pattern. JuCify imports the native call graph,
    links JNI transitions to the Android bytecode representation, then lets the
    downstream taint analysis recover paths that cross Java and native code.
  outputLabel: JuCify output
  countOutput: false
  note: >-
    Simulated preview using representative fictional APKs, JNI methods, graph
    counts and taint paths; nothing runs in the browser. The getter, leaker and
    delegation patterns mirror the cross-language scenario families discussed
    by the work, but the concrete outputs below are not paper results.
  scenarios:
    - label: Native getter → Java sink
      query: ./main.sh -f lab.flashlight.apk -p Android-platforms/jars/stubs/ -t
      thinking:
        - Loading the APK bytecode and native libraries…
        - Importing binary call-graph nodes and JNI links…
        - Adding native-to-Java return edges…
        - Running taint analysis on the unified graph…
      output:
        - "JuCify — unified analysis completed"
        - "[✓] Cross-language path found"
        - "  source  nativeGetImei()                                  [NATIVE]"
        - "  bridge  DeviceBridge.readIdentifier()                     [JAVA]"
        - "  sink    Log.d(String,String)                              [JAVA]"
        - "  unified graph: 1,842 nodes · 6,104 edges · 7 JNI edges added"
      explanation: >-
        In this fictional getter pattern, the sensitive value originates inside
        native code and returns to Java before reaching a sink. Linking the JNI
        return is what makes the complete path visible.
    - label: Java source → native network sink
      query: ./main.sh -f lab.scanner.apk -p Android-platforms/jars/stubs/ -t
      thinking:
        - Resolving the Java call into nativeSend(String)…
        - Mapping the native binary's imported networking functions…
        - Joining Java and binary call-graph fragments…
        - Propagating the tainted phone number into the native sink…
      output:
        - "JuCify — unified analysis completed"
        - "[✓] Cross-language path found"
        - "  source  TelephonyManager.getLine1Number()                 [JAVA]"
        - "  bridge  NativeUploader.nativeSend(String)                 [JNI]"
        - "  sink    connect() → send()                                [NATIVE]"
        - "  path: 11 statements · 5 Java · 6 native"
      explanation: >-
        This simulated leaker pattern starts in Java but crosses into native
        code before the network send, a path a Java-only representation would
        stop at the JNI method declaration.
    - label: Entire flow delegated to native code
      query: ./main.sh -f lab.battery.apk -p Android-platforms/jars/stubs/ -t
      thinking:
        - Finding the Java entry point that delegates to nativeRun()…
        - Recovering native calls to platform sources and sinks…
        - Connecting imported functions through the binary call graph…
        - Reporting the path back in Android analysis terms…
      output:
        - "JuCify — unified analysis completed"
        - "[✓] Native-only sensitive flow found"
        - "  Java entry  NativeWorker.run() → nativeRun()"
        - "  source      getSimSerialNumber()                          [NATIVE]"
        - "  sink        sendTextMessage(...)                          [NATIVE]"
        - "  new binary nodes: 23 · new cross-language edges: 9"
      explanation: >-
        Here Java only delegates. The fictional source and sink both live below
        the JNI boundary, illustrating why native call-graph recovery is needed
        even when the bytecode itself contains no obvious sensitive flow.
