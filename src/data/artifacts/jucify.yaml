name: JuCify
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Unifies Android bytecode and native code into a single representation so
  static analyzers can see the whole app — revealing sensitive flows that
  cross the Java/native boundary.
authors:
  - Jordan Samhi
  - Jun Gao
  - Nadia Daoudi
  - Pierre Graux
  - Henri Hoyez
  - Xiaoyu Sun
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
status: stable
figure: jucify.png
figureCaption: Overview of the JuCify approach, from the angle of call-graph construction (ICSE 2022 paper, Figure 2)
paper:
  title: "JuCify: A Step Towards Android Code Unification for Enhanced Static Analysis"
  venue: ICSE
  year: 2022
  doi: 10.1145/3510003.3512766
links:
  github: https://github.com/JordanSamhi/JuCify
tags:
  - android
  - native-code
  - static-analysis
  - call-graph
demo:
  style: terminal
  intro: >-
    JuCify combines Android bytecode and native code before downstream static
    analysis. The repository pins the artifact commit and documents a main.sh
    entry point for APK analysis.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    These commands come from the official artifact instructions. No synthetic
    JNI methods, graph edges or application results are displayed.
  scenarios:
    - label: Check out the artifact revision
      query: git checkout 6897c58350773987da0a2c52a99fd4ebf1edc39e
      thinking:
        - Select the revision identified by the artifact documentation.
        - Keep the implementation aligned with the evaluated release.
      output:
        - "Official artifact revision."
        - "Run inside a local clone of the JuCify repository."
      explanation: >-
        Pinning the documented revision helps reproduce the implementation used
        by the artifact.
    - label: Analyze an APK
      query: ./main.sh -f PATH_TO_APK -p PATH_TO_PLATFORMS
      thinking:
        - Provide a real APK and Android platforms directory.
        - Let JuCify construct the unified representation for analysis.
      output:
        - "Official artifact command — not executed by this website."
        - "Results depend on the selected APK and its native code."
      explanation: >-
        A real run produces the cross-language analysis data; the catalog does
        not invent paths, nodes or edges.
