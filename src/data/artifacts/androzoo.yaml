name: AndroZoo
type: dataset
area: Android Datasets
description: >-
  A growing collection of more than 25 million Android apps gathered from
  several markets, continuously updated since 2016 and used by hundreds of
  research teams worldwide.
authors:
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
  - Yves Le Traon
logo: android
addedAt: '2026-07-06'
paper:
  title: "AndroZoo: Collecting Millions of Android Apps for the Research Community"
  venue: MSR
  year: 2016
  doi: 10.1145/2901739.2903508
links:
  website: https://androzoo.uni.lu
  access: https://androzoo.uni.lu/access
tags:
  - android
  - apps
  - malware
  - large-scale
dataset:
  stats:
    - value: 27.5
      suffix: "M+"
      animate: false
      label: Android apps collected (live total on AndroZoo)
    - value: 2016
      label: continuously updated since
      animate: false
  sampleTitle: Sample app hashes (SHA256)
  sampleSource: latest.csv
  sampleCount: 10
  samplesFile: androzoo-shas.txt
  sampleNote: >-
    Real SHA256 identifiers from AndroZoo. The dataset is distributed as a
    hash-indexed CSV (sha256, pkg_name, dex_date, vt_detection, markets…); each
    hash resolves to an APK through the API below.
  usage:
    title: Download an app
    note: >-
      Request a free API key on the access page, then fetch any APK by its
      SHA256:
    code: |
      curl -O --remote-header-name -G \
        -d apikey=${APIKEY} \
        -d sha256=${SHA256} \
        https://androzoo.uni.lu/api/download
