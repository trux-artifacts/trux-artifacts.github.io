name: AndroLibZoo
type: dataset
area: Android Datasets
description: >-
  A reliable, evolving dataset of 34,813 third-party Android libraries built
  through software dependency analysis, for use in static analysis and
  library-filtering pipelines.
authors:
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
addedAt: '2026-07-06'
figure: androlibzoo.png
figureCaption: Overview of the methodology to construct AndroLibZoo (MSR 2024 paper, Figure 2)
paper:
  title: "AndroLibZoo: A Reliable Dataset of Libraries Based on Software Dependency Analysis"
  venue: MSR
  year: 2024
  doi: 10.1145/3643991.3644866
links:
  github: https://github.com/JordanSamhi/AndroLibZoo
  download: https://raw.githubusercontent.com/JordanSamhi/AndroLibZoo/main/AndroLibZoo.lst
  resources:
    - label: Archived release (Zenodo)
      url: https://doi.org/10.5281/zenodo.10072709
tags:
  - android
  - libraries
  - static-analysis
dataset:
  stats:
    - value: 34813
      label: third-party libraries
    - value: 69316
      label: Maven groupIds mined
  sampleTitle: Sample entries
  sampleSource: AndroLibZoo.lst
  sampleCount: 8
  sampleNote: >-
    Real package prefixes drawn from AndroLibZoo.lst. Download the full list
    from the repository for the complete, evolving dataset.
  samples:
    - pro.cryptoevil
    - br.com.prodist.native-tools
    - codes.rafael.task
    - org.imixs.jwt
    - org.sonatype.m2e.egit
    - com.jinrishici
    - com.karmanno.plugins.dependency
    - io.bpic.cielo
    - org.jsonschema2pojo
    - com.gimbal.android.v2
    - tech.anima
    - com.vladsch.tree-iteration
    - co.zecko.retailer
    - com.kayrasolutions.aem.foundation
    - eu.rssw.pct
    - org.hyperscala
    - net.lightoze.gwt-i18n-server
    - org.paxml
    - ch.so.agi.interlis-repository-creator
    - com.almworks.integers
    - name.velikodniy.vitaliy
    - de.entrecode
  usage:
    title: Filter application code with AndroLibZoo
    note: >-
      The official README shows the list wrapped by AndroSpecter's
      LibrariesManager, which classifies a Soot class from its package prefix.
    code: |
      LibrariesManager manager = LibrariesManager.v();
      SootClass sootClass = /* class extracted from the APK */;

      if (manager.isLibrary(sootClass)) {
          System.out.println("The class is a library.");
      }
