name: Correctness isn't Efficiency
type: benchmark
area: LLMs for Software Engineering
logo: llm
description: >-
  A profiling pipeline and metrics (DMPD over memory-usage profiles) showing
  that functionally correct LLM-generated solutions can diverge widely in
  runtime memory behavior — correctness does not imply efficiency.
authors:
  - Prateek Kumar Rajput
  - Yewei Song
  - Abdoul Aziz Bonkoungou
  - Iyiola E. Olatunji
  - Abdoul Kader Kaboré
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
figure: correctness-efficiency.png
figureCaption: Pipeline for code generation and memory profiling (ICSE-SEIP 2026 paper, Figure 4)
paper:
  title: "Correctness isn't Efficiency: Runtime Memory Divergence in LLM-Generated Code"
  venue: ICSE-SEIP
  year: 2026
  doi: 10.1145/3786583.3786908
tags:
  - llm
  - code-generation
  - memory
  - benchmarks
demo:
  style: terminal
  intro: >-
    Explore two aggregate results reported in the ICSE-SEIP paper. Both compare
    multiple functionally correct generations, so the changes below measure
    runtime-memory stability rather than test correctness.
  outputLabel: Paper-reported metrics
  countOutput: false
  note: >-
    Results explorer only — these values are copied from the published study
    and are not recomputed in the browser. Higher MIS means greater divergence
    between the shapes of correct solutions' memory profiles.
  scenarios:
    - label: GPT-4o on BigOBench
      query: "BigOBench · GPT-4o · temperature 0 → 0.95"
      thinking:
        - Reading the published BigOBench aggregate at both temperatures.
      output:
        - "pass@1: 0.68 → 0.80"
        - "MIS_macro: 0.0042 → 0.0072"
        - "Interpretation: correctness rises, but correct solutions become less runtime-stable."
      explanation: >-
        The paper uses this result to show that a higher pass@1 score can hide
        increased divergence in memory-allocation behavior.
    - label: o4-mini on BigOBench
      query: "BigOBench · OpenAI o4-mini · temperature 0 → 0.95"
      thinking:
        - Reading the published BigOBench aggregate at both temperatures.
      output:
        - "pass@1: 0.69 → 0.80"
        - "MIS_macro: 0.0029 → 0.0126"
        - "Interpretation: sampling diversity affects execution paths, not only surface syntax."
      explanation: >-
        This second reported example shows a larger increase in instability
        while the generated programs that enter the comparison still pass the
        benchmark tests.
