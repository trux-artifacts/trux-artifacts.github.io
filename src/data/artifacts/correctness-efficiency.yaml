figureCaption: Pipeline for code generation and memory profiling (ICSE-SEIP 2026 paper, Figure 4)
paper:
  title: "Correctness isn't Efficiency: Runtime Memory Divergence in LLM-Generated Code"
  venue: ICSE-SEIP
  year: 2026
  doi: 10.1145/3786583.3786908
tags:
  - llm
  - code-generation
  - memory
  - benchmarks
demo:
  style: terminal
  intro: >-
    Pick a coding task to watch a simulated profiling run compare several
    functionally correct solutions. The mock console separates test success
    from runtime-memory behavior and makes profile divergence visible.
  outputLabel: Mock profiler output
  countOutput: false
  note: >-
    Interactive simulation only — no code is generated or profiled in the
    browser. Programs, traces, timings, DMPD/MIS values, and interpretations are
    fictional examples of the paper's analysis workflow, not reported results.
  scenarios:
    - label: Deduplicate event IDs
      query: profile --task deduplicate_ids --model mock-gpt --samples 3
      thinking:
        - Running the same hidden tests against three generated solutions…
        - Sampling resident memory every 10 ms…
        - Normalizing profile length and computing pairwise DMPD…
        - Aggregating divergence into an MIS score…
      output:
        - "tests       sample-01 PASS · sample-02 PASS · sample-03 PASS"
        - "peak RSS    18.6 MB · 42.1 MB · 19.3 MB"
        - "strategy    hash set · sorted copy · hash set"
        - "mock MIS    0.0374  →  runtime profiles diverge despite equal correctness"
      explanation: >-
        All three mock solutions pass, but the sorting strategy allocates a
        large copy of the input. Functional correctness alone would hide that
        operational difference.
    - label: Sliding-window maximum
      query: profile --task window_max --temperature 0.95 --samples 4
      thinking:
        - Executing four test-passing generations on identical inputs…
        - Aligning their allocation profiles…
        - Comparing transient peaks and retained memory…
        - Flagging the most distant profile pair…
      output:
        - "correctness 4 / 4 samples pass"
        - "peak RSS    23.8 MB · 24.0 MB · 87.5 MB · 23.9 MB"
        - "outlier     sample-03 stores every candidate window"
        - "mock DMPD   sample-01 ↔ sample-03 = 0.118"
      explanation: >-
        The simulated outlier returns the right values while retaining far more
        intermediate state. The demo shows how profile distance can surface an
        inefficient implementation that a pass/fail benchmark misses.
    - label: Breadth-first search
      query: profile --task shortest_path --temperature 0 --samples 3
      thinking:
        - Running the generated graph routines under the profiler…
        - Verifying output equality on every test graph…
        - Comparing allocation and release phases…
        - Summarizing stability across correct solutions…
      output:
        - "correctness 3 / 3 samples pass"
        - "peak RSS    31.2 MB · 31.6 MB · 30.9 MB"
        - "mock MIS    0.0021  →  profiles remain closely aligned"
        - "verdict     correct and runtime-stable in this simulated batch"
      explanation: >-
        This third mock illustrates a low-divergence result: separate
        generations can be both functionally correct and operationally similar.
