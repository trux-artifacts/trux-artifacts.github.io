name: GeoTwins Dataset
type: dataset
area: Android Datasets
description: >-
  A dataset of 81,963 GeoTwin pairs grouped into 859 GeoFamilies. Each pair
  contains two functionally similar, same-branding Android app variants released
  under different package names across countries, for research on geographic app
  disparities.
authors:
  - Marco Alecci
  - Pedro Jesús Ruiz Jiménez
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: geotwins.png
figureCaption: Overview of the data collection and processing pipeline used to construct the Global Dataset and the GeoTwins Dataset (MobiSys 2026 paper, Figure 2)
paper:
  title: "GeoTwins: Uncovering Hidden Geographic Disparities in Android Apps"
  venue: MobiSys
  year: 2026
  doi: 10.1145/3745756.3809191
links:
  github: https://github.com/Trustworthy-Software/GeoTwins
tags:
  - android
  - geographic-disparities
  - apps
dataset:
  stats:
    - value: 81963
      label: GeoTwin pairs (two regional variants each)
    - value: 859
      label: GeoFamilies
  sampleTitle: Sample GeoTwin pairs
  sampleSource: 4_geoTwins.csv
  sampleCount: 6
  sampleNote: >-
    Real pairs from the dataset — each row contains two same-branding regional
    variants published under different package names. An app can occur in
    several pairs within one GeoFamily. Download the full pair and family lists
    from the repository.
  samples:
    - "com.climax.homeportal.tw  ↔  com.climax.homeportal.us"
    - "com.americanexpress.android.acctsvcs.fr  ↔  com.americanexpress.android.acctsvcs.uk"
    - "com.americanexpress.android.acctsvcs.us  ↔  com.americanexpress.android.acctsvcs.japan"
    - "com.bddroid.android.verbnepali  ↔  com.bddroid.android.verbkorean"
    - "com.bddroid.android.verbnepali  ↔  com.bddroid.android.verbjapanese"
    - "com.radiosonline.radiofmjapan  ↔  com.radiosonline.radiofmchile"
    - "com.radiosonline.radiofmiceland  ↔  com.radiosonline.radiofmnewzealand"
    - "all.language.translator.hub.samoantoturkishtranslator  ↔  all.language.translator.hub.icelandictoyiddishtranslator"
    - "com.americanexpress.android.acctsvcs.fr  ↔  com.americanexpress.android.acctsvcs.de"
    - "all.language.translator.hub.samoantoturkishtranslator  ↔  all.language.translator.hub.somalitozulutranslator"
  usage:
    title: Explore pairs and families
    note: >-
      The repository releases the pair list, the family grouping, and the
      notebooks used for the paper's feature comparisons.
    code: |
      git clone https://github.com/Trustworthy-Software/GeoTwins.git
      cd GeoTwins
      find . -name '4_geoTwins.csv' -print
