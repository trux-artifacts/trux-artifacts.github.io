name: AndroBomb
type: tool
area: Android Security & Malware
description: >-
  Automatically infects Android apps with logic bombs (trigger-based
  behaviors) to produce ground-truth benchmarks for logic bomb detection —
  the tool behind the TriggerZoo dataset.
authors:
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: androbomb.png
figureCaption: Overview of the AndroBomb approach to infect an Android app (MSR 2022 paper, Figure 1)
paper:
  title: "TriggerZoo: A Dataset of Android Applications Automatically Infected with Logic Bombs"
  venue: MSR
  year: 2022
  doi: 10.1145/3524842.3528020
links:
  github: https://github.com/JordanSamhi/AndroBomb
  resources:
    - label: Restricted software archive (Zenodo)
      url: https://doi.org/10.5281/zenodo.5907924
tags:
  - android
  - logic-bombs
  - instrumentation
demo:
  style: terminal
  intro: >-
    Choose a trigger/payload pair. AndroBomb instruments a research APK,
    injects the guarded behavior, rebuilds and signs the package, and emits the
    ground-truth record used to evaluate logic-bomb detectors.
  outputLabel: AndroBomb output
  countOutput: false
  note: >-
    Simulated preview using representative fictional inputs and outputs;
    nothing runs in the browser and no APK is modified. The command shape and
    trigger/payload vocabulary follow the official artifact, but app names,
    insertion points and generated filenames below are illustrative and are not
    results reported by the paper. AndroBomb access remains restricted to
    identified researchers through Zenodo.
  scenarios:
    - label: Time trigger → native phone-number write
      query: java -jar AndroBomb/target/AndroBomb-0.1-jar-with-dependencies.jar -p platforms/ -a lab.flashlight.apk -o out/ -t time -g native_write_phone_number -s build-tools/apksigner -z build-tools/zipalign
      thinking:
        - Loading the Android platform and resolving the APK entry points…
        - Selecting a reachable insertion point in the activity lifecycle…
        - Generating the time predicate and guarded native bridge…
        - Rebuilding, aligning and signing the instrumented package…
      output:
        - "AndroBomb — processing lab.flashlight.apk"
        - "[✓] Call graph ready · 1 reachable insertion point selected"
        - "[✓] Trigger generated: time"
        - "[✓] Guarded code generated: native_write_phone_number"
        - "[✓] Injected at <lab.flashlight.MainActivity: void onCreate(Bundle)>"
        - "[✓] Rebuilt, aligned and signed: out/lab.flashlight_infected.apk"
        - "[✓] Ground-truth manifest: out/lab.flashlight_infected.json"
      explanation: >-
        A simulated end-to-end run of the exact trigger/payload pairing shown in
        the official README. The preview makes the transformation stages and
        resulting ground-truth record visible without executing the restricted
        software.
    - label: Location trigger → HTTP location payload
      query: java -jar AndroBomb/target/AndroBomb-0.1-jar-with-dependencies.jar -p platforms/ -a lab.weather.apk -o out/ -t location -g http_location -s build-tools/apksigner -z build-tools/zipalign
      thinking:
        - Discovering location callbacks and candidate component entry points…
        - Synthesizing a geofence-style trigger predicate…
        - Wiring the guarded HTTP payload into the selected callback…
        - Repackaging the APK and exporting its label…
      output:
        - "AndroBomb — processing lab.weather.apk"
        - "[✓] Trigger generated: location"
        - "[✓] Guarded code generated: http_location"
        - "[✓] Injected at <lab.weather.LocationService: void onLocationChanged(Location)>"
        - "[✓] Added required network permission to the transformed manifest"
        - "[✓] Rebuilt package: out/lab.weather_infected.apk"
        - "[✓] Label: trigger=location · payload=http_location"
      explanation: >-
        This fictional research APK illustrates a location-dependent hidden
        operation. The paths and results are simulated; they demonstrate how an
        injected sample can carry both the transformed APK and an explicit
        ground-truth label.
    - label: SMS trigger → device-identifier payload
      query: java -jar AndroBomb/target/AndroBomb-0.1-jar-with-dependencies.jar -p platforms/ -a lab.notes.apk -o out/ -t sms -g sms_imei -s build-tools/apksigner -z build-tools/zipalign
      thinking:
        - Locating the broadcast receiver and its message-handling branch…
        - Generating the SMS-content trigger…
        - Injecting the guarded identifier operation…
        - Verifying the rebuilt package and writing experiment metadata…
      output:
        - "AndroBomb — processing lab.notes.apk"
        - "[✓] Receiver selected: lab.notes.MessageReceiver.onReceive"
        - "[✓] Trigger generated: sms"
        - "[✓] Guarded code generated: sms_imei"
        - "[✓] Rebuilt package: out/lab.notes_infected.apk"
        - "[✓] Ground truth: reachable=true · insertionDepth=2"
      explanation: >-
        This simulated sample shows a remote-message trigger paired with a
        guarded identifier operation. The fictional output is intended as a UI
        preview only, not as evidence of a real injected application.
