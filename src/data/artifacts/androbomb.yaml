name: AndroBomb
type: tool
area: Android Security & Malware
description: >-
  Automatically infects Android apps with logic bombs (trigger-based
  behaviors) to produce ground-truth benchmarks for logic bomb detection —
  the tool behind the TriggerZoo dataset.
authors:
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: androbomb.png
figureCaption: Overview of the AndroBomb approach to infect an Android app (MSR 2022 paper, Figure 1)
paper:
  title: "TriggerZoo: A Dataset of Android Applications Automatically Infected with Logic Bombs"
  venue: MSR
  year: 2022
  doi: 10.1145/3524842.3528020
links:
  github: https://github.com/JordanSamhi/AndroBomb
  resources:
    - label: Restricted software archive (Zenodo)
      url: https://doi.org/10.5281/zenodo.5907924
tags:
  - android
  - logic-bombs
  - instrumentation
demo:
  style: terminal
  intro: >-
    The official README documents how an authenticated researcher can configure
    one AndroBomb run with a trigger type, guarded-code type, Android platform,
    APK, output directory, apksigner, and zipalign.
  outputLabel: Documentation
  countOutput: false
  note: >-
    Documentation preview only — this exact command comes from the official
    README and is not executed in the browser. The software archive is
    restricted to authenticated, identified researchers to reduce misuse.
  scenarios:
    - label: Documented time-trigger example
      query: |-
        java -jar AndroBomb/target/AndroBomb-0.1-jar-with-dependencies.jar \
          -p PATH_TO_PLATFORMS \
          -a PATH_TO_APK \
          -o OUTPUT_DIRECTORY \
          -t time \
          -g native_write_phone_number \
          -s PATH_TO_APKSIGNER \
          -z PATH_TO_ZIPALIGN
      thinking:
        - Showing the repository's documented invocation; no APK is processed.
      output:
        - "Documented AndroBomb invocation (not executed)."
        - "Required inputs: restricted AndroBomb archive, Android platforms, an APK, apksigner, and zipalign."
        - "Access requests: https://doi.org/10.5281/zenodo.5907924"
      explanation: >-
        This is the single concrete example published by the authors. It pairs
        the time trigger with native_write_phone_number; actual output depends
        on the researcher-provided APK and environment and is therefore not
        simulated here.
