name: RAICC
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Reveals atypical inter-component communication (ICC) in Android apps by
  instrumenting them so that state-of-the-art analyzers such as FlowDroid can
  detect previously missed data leaks.
authors:
  - Jordan Samhi
  - Alexandre Bartel
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
status: stable
figure: raicc.png
figureCaption: Overview of the RAICC instrumentation tool (ICSE 2021 paper, Figure 2)
paper:
  title: "RAICC: Revealing Atypical Inter-Component Communication in Android Apps"
  venue: ICSE
  year: 2021
  doi: 10.1109/ICSE43902.2021.00126
links:
  github: https://github.com/JordanSamhi/RAICC
  download: https://github.com/JordanSamhi/RAICC/releases/download/1.0/RAICC.jar
tags:
  - android
  - icc
  - taint-analysis
demo:
  style: terminal
  intro: >-
    Reproduce the paper with RAICC release 1.0, the version explicitly required
    by the official repository for the ICSE 2021 experiments.
  outputLabel: Paper-artifact workflow
  countOutput: false
  note: >-
    These commands follow the README at tag 1.0. No application name,
    instrumentation count or runtime is fabricated, and the newer RAICC 2.0
    workflow is deliberately not presented as the evaluated paper artifact.
  scenarios:
    - label: Select release 1.0
      query: git checkout 1.0
      thinking:
        - Clone the official RAICC repository.
        - Select the release identified for reproducing the paper.
      output:
        - "Official paper-artifact tag: 1.0."
        - "A prebuilt RAICC.jar from the same release is also linked above."
      explanation: >-
        The current default branch documents RAICC 2.0, while the repository
        explicitly directs paper reproduction to version 1.0.
    - label: Build the evaluated release
      query: |-
        mvn clean install:install-file -Dfile=libs/ic3-0.2.1-full.jar -DgroupId=edu.psu.cse.siis -DartifactId=ic3 -Dversion=0.2.1 -Dpackaging=jar
        mvn clean install:install-file -Dfile=libs/preprocessIntentSender-0.1.jar -DgroupId=lu.uni.trux -DartifactId=preprocessIntentSender -Dversion=0.1 -Dpackaging=jar
        mvn clean install
      thinking:
        - Install the bundled IC3 dependency into the local Maven repository.
        - Install the bundled IntentSender preprocessor, then build RAICC.
      output:
        - "Official tag-1.0 build sequence — not executed by this website."
      explanation: >-
        These are the three installation commands documented by the evaluated
        release. Its README also recommends increasing MAVEN_OPTS if the build
        encounters a stack overflow.
    - label: Analyze an APK with release 1.0
      query: java -jar RAICC/target/RAICC-0.1-jar-with-dependencies.jar -a PATH_TO_APK -cp PATH_TO_PLATFORMS -model PATH_TO_COAL_MODELS
      thinking:
        - Provide a real APK and Android platform directory.
        - Point version 1.0 at RAICC's released COAL models.
      output:
        - "Official release-1.0 entry point — not executed by this website."
        - "Replace the placeholder paths with real local paths."
      explanation: >-
        Results depend on the selected APK. This preview therefore documents
        the paper-aligned command without inventing transformed instructions or
        timings.
