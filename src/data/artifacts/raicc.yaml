name: RAICC
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Reveals atypical inter-component communication (ICC) in Android apps by
  instrumenting them so that state-of-the-art analyzers such as FlowDroid can
  detect previously missed data leaks.
authors:
  - Jordan Samhi
  - Alexandre Bartel
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
status: stable
figure: raicc.png
figureCaption: Overview of the RAICC instrumentation tool (ICSE 2021 paper, Figure 2)
paper:
  title: "RAICC: Revealing Atypical Inter-Component Communication in Android Apps"
  venue: ICSE
  year: 2021
  doi: 10.1109/ICSE43902.2021.00126
links:
  github: https://github.com/JordanSamhi/RAICC
  download: https://github.com/JordanSamhi/RAICC/releases/download/1.0/RAICC.jar
tags:
  - android
  - icc
  - taint-analysis
demo:
  style: terminal
  intro: >-
    Choose a fictional app and watch the paper-aligned RAICC 1.0 workflow recover
    atypical inter-component communication, insert equivalent standard ICC
    statements and expose the resulting links to downstream analysis.
  outputLabel: Simulated RAICC 1.0 output
  countOutput: false
  note: >-
    Interactive mock preview — APK names, statement counts, timings and
    downstream paths are fictional and are not paper measurements. The commands
    use the release-1.0 JAR and options required by the official artifact; no APK
    is instrumented in the browser.
  scenarios:
    - label: PendingIntent.send()
      query: java -jar RAICC/target/RAICC-0.1-jar-with-dependencies.jar -a samples/bright-events.apk -cp android-platforms/ -model RAICC/artefacts/coal/
      thinking:
        - Loading Soot, IC3 and the Android platform…
        - Resolving PendingIntent creation sites…
        - Propagating the target component type…
        - Injecting equivalent standard ICC statements…
      output:
        - "RAICC 1.0 mock run — completed"
        - "APK: com.demo.brightevents (fictional)"
        - "Atypical ICC call sites: 3"
        - "Resolved targets: 3"
        - "Inserted standard ICC statements: 3"
        - "Example: PendingIntent.send() → startActivity(EventDetailsActivity)"
        - "Downstream preview: 1 additional candidate FlowDroid path"
        - "Elapsed: 8.7 s (simulated)"
      explanation: >-
        The mock app launches an activity through PendingIntent.send(). RAICC
        makes that hidden component transition explicit so a conventional ICC
        analyzer can traverse it.
    - label: AlarmManager.setExact()
      query: java -jar RAICC/target/RAICC-0.1-jar-with-dependencies.jar -a samples/skytrail-weather.apk -cp android-platforms/ -model RAICC/artefacts/coal/
      thinking:
        - Recovering the PendingIntent passed to AlarmManager…
        - Resolving its destination service…
        - Rewriting the atypical link as standard ICC…
        - Re-running the downstream link discovery…
      output:
        - "RAICC 1.0 mock run — completed"
        - "APK: com.demo.skytrail.weather (fictional)"
        - "Atypical ICC call sites: 1"
        - "Resolved targets: 1"
        - "Inserted standard ICC statements: 1"
        - "Example: AlarmManager.setExact(...) → startService(RefreshService)"
        - "Downstream preview: delayed component edge now visible"
        - "Elapsed: 6.3 s (simulated)"
      explanation: >-
        AlarmManager schedules a PendingIntent rather than calling the component
        directly. The simulated transformation exposes the delayed service edge
        without claiming that these counts came from the evaluation.
    - label: Location updates
      query: java -jar RAICC/target/RAICC-0.1-jar-with-dependencies.jar -a samples/pixelrun-arcade.apk -cp android-platforms/ -model RAICC/artefacts/coal/
      thinking:
        - Tracing the PendingIntent registered for location updates…
        - Inferring receiver targets from the intent…
        - Generating explicit ICC calls…
        - Checking newly reachable component paths…
      output:
        - "RAICC 1.0 mock run — completed"
        - "APK: com.demo.pixelrun.arcade (fictional)"
        - "Atypical ICC call sites: 2"
        - "Resolved targets: 2"
        - "Inserted standard ICC statements: 2"
        - "Example: requestLocationUpdates(..., PendingIntent) → sendBroadcast(GeoReceiver)"
        - "Downstream preview: 2 receiver edges now visible"
        - "Elapsed: 10.5 s (simulated)"
      explanation: >-
        Registering a PendingIntent with LocationManager creates component
        transitions that ordinary call-graph construction can miss. This mock
        shows RAICC translating those links into analyzable broadcasts.
    - label: IntentSender chain
      query: java -jar RAICC/target/RAICC-0.1-jar-with-dependencies.jar -a samples/quicknote-pro.apk -cp android-platforms/ -model RAICC/artefacts/coal/
      thinking:
        - Locating IntentSender creation and forwarding sites…
        - Propagating destinations through wrapper methods…
        - Materializing each inferred component transition…
        - Summarizing the enriched ICC graph…
      output:
        - "RAICC 1.0 mock run — completed"
        - "APK: com.demo.quicknote.pro (fictional)"
        - "Atypical ICC call sites: 5"
        - "Resolved targets: 4"
        - "Inserted standard ICC statements: 4"
        - "Example chain: sendIntent() → ShareActivity → UploadService"
        - "Downstream preview: multi-component path recovered"
        - "Elapsed: 13.1 s (simulated)"
      explanation: >-
        IntentSender can relay an intent through several wrappers. The mock
        result illustrates RAICC recovering a component chain and exposing it to
        analyses that only understand standard ICC APIs.
