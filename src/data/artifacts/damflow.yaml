name: DamFlow
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Prevents a flood of irrelevant data flows in Android taint analysis by
  scoring the semantic relevance of each reported flow, keeping analysts
  focused on the flows that matter.
cardDescription: Scores Android taint-analysis flows by semantic relevance to reduce noise.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Marc Miltenberger
  - Steven Arzt
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-07'
logo: android
figure: damflow.png
figureCaption: DamFlow approach overview (TOSEM 2026 paper, Figure 2)
paper:
  title: "DamFlow: Preventing a Flood of Irrelevant Data Flows in Android Apps"
  venue: TOSEM
  year: 2026
  doi: 10.1145/3772002
links:
  github: https://github.com/Trustworthy-Software/DamFlow
  website: https://doi.org/10.1145/3772002
tags:
  - android
  - taint-analysis
  - data-flows
  - machine-learning
demo:
  style: terminal
  intro: >-
    Pick an app category. DamFlow starts from FlowDroid's candidate source-to-
    sink paths, embeds each flow, then ranks it against the behavioral context
    learned for comparable apps so the analyst sees the unusual paths first.
  outputLabel: DamFlow output
  countOutput: false
  note: >-
    Simulated preview using representative fictional inputs, flows, anomaly
    scores and application names; nothing runs in the browser. These examples
    illustrate the released Extraction → Embedding → Training → Testing
    workflow but are not outputs or quantitative results reported by the paper.
  scenarios:
    - label: Calculator · location leak
      query: notebooks/Testing.ipynb --apk lab.calculator.apk --category CALCULATOR
      thinking:
        - Importing FlowDroid's candidate source-to-sink paths…
        - Encoding each path with the configured embedding model…
        - Loading the CALCULATOR category anomaly model…
        - Ranking paths by semantic relevance and rarity…
      output:
        - "FlowDroid candidates: 12"
        - "DamFlow ranking"
        - "  [0.97] getLastKnownLocation() → HttpURLConnection.getOutputStream()  REVIEW"
        - "  [0.14] getPackageName() → TextView.setText()                         expected"
        - "  [0.06] getString(R.string.theme) → Log.d()                           expected"
        - "High-priority flows retained: 1 / 12"
      explanation: >-
        In this fictional calculator, location-to-network behavior is far from
        the category norm, so the simulated ranking lifts it above routine UI
        and configuration flows.
    - label: Weather · contextual false positive avoided
      query: notebooks/Testing.ipynb --apk lab.weather.apk --category WEATHER
      thinking:
        - Importing the same style of FlowDroid candidates…
        - Embedding source, sink and path context…
        - Comparing the paths with the WEATHER model…
        - Separating expected location use from unusual identifiers…
      output:
        - "FlowDroid candidates: 31"
        - "DamFlow ranking"
        - "  [0.86] getDeviceId() → HttpURLConnection.getOutputStream()           REVIEW"
        - "  [0.32] getLastKnownLocation() → HttpURLConnection.getOutputStream()  category-normal"
        - "  [0.08] getString(R.string.units) → Log.d()                            expected"
        - "High-priority flows retained: 1 / 31"
      explanation: >-
        Location-to-network is normal for the fictional weather category and is
        therefore demoted, while an identifier-to-network path remains unusual.
        This is the contextual distinction the mock is designed to convey.
    - label: Finance · several unusual identifiers
      query: notebooks/Testing.ipynb --apk lab.wallet.apk --category FINANCE
      thinking:
        - Loading backward taint-analysis paths…
        - Embedding the semantic roles of sources and sinks…
        - Scoring against the FINANCE category baseline…
        - Producing a concise analyst-facing shortlist…
      output:
        - "FlowDroid candidates: 47"
        - "DamFlow ranking"
        - "  [0.93] getSimSerialNumber() → SmsManager.sendTextMessage()            REVIEW"
        - "  [0.89] getLine1Number() → HttpURLConnection.getOutputStream()         REVIEW"
        - "  [0.82] getDeviceId() → HttpURLConnection.getOutputStream()            REVIEW"
        - "  [0.10] getString(R.string.locale) → Log.d()                           expected"
        - "High-priority flows retained: 3 / 47"
      explanation: >-
        The fictional finance run shows how a long raw list can collapse into a
        small set of semantically suspicious identifier flows for manual review.
