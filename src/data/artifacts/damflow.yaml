name: DamFlow
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Prevents a flood of irrelevant data flows in Android taint analysis by
  scoring the semantic relevance of each reported flow, keeping analysts
  focused on the flows that matter.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Marc Miltenberger
  - Steven Arzt
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: damflow.png
figureCaption: DamFlow approach overview (TOSEM 2026 paper, Figure 2)
paper:
  title: "DamFlow: Preventing a Flood of Irrelevant Data Flows in Android Apps"
  venue: TOSEM
  year: 2026
  doi: 10.1145/3772002
links:
  github: https://github.com/Trustworthy-Software/DamFlow
  website: https://doi.org/10.1145/3772002
tags:
  - android
  - taint-analysis
  - data-flows
  - machine-learning
demo:
  style: terminal
  intro: >-
    DamFlow's public artifact is a notebook pipeline. Set up its documented
    environment, configure the external services, then run the notebooks in the
    order given by the repository.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    This preview reproduces the official repository workflow. It does not
    fabricate taint-flow scores, rankings or application-specific results.
  scenarios:
    - label: Create the environment
      query: conda env create -f environment.yml
      thinking:
        - Read the pinned dependencies from the released environment file.
        - Activate the damFlowEnv environment after creation.
      output:
        - "Then run: conda activate damFlowEnv"
        - "Official setup command — not executed by this website."
      explanation: >-
        DamFlow is released as Python notebooks with a Conda environment rather
        than as a single command-line executable.
    - label: Configure required services
      query: Configure .env, then start the Redis service used by the notebooks
      thinking:
        - Provide the model/API configuration expected by the released notebooks.
        - Make the configured Redis instance available before running the pipeline.
      output:
        - "Configuration step documented by the official repository."
        - "No credential or secret value is displayed by this catalog."
      explanation: >-
        The exact .env values depend on the researcher's local model and service
        setup, so the catalog documents the prerequisite without inventing them.
    - label: Run the notebook pipeline
      query: Extraction → Embedding → Training → Testing
      thinking:
        - Run the Extraction notebook first.
        - Continue with Embedding, Training and Testing in that order.
      output:
        - "Official notebook order — not executed by this website."
        - "Scores and rankings are produced only by a real configured run."
      explanation: >-
        This order mirrors the released pipeline from flow extraction through
        representation learning, model training and evaluation.
