    - label: Source code (Zenodo)
      url: https://zenodo.org/records/11636137
tags:
  - security-patches
  - llm
  - vulnerabilities
demo:
  style: patch
  intro: >-
    Inspect fictional commits as LLMDA might: generate a concise explanation of
    the change, align code and text representations, then classify whether the
    patch silently addresses a security weakness.
  note: >-
    Interactive simulation only — no classifier or LLM runs in the browser.
    Commits, files, explanations, similarity scores, probabilities, and labels
    are fictional UI examples and are not predictions or results from the
    paper.
  scenarios:
    - label: Reject path traversal
      file: src/archive/Extractor.java
      pattern: Mock verdict · SECURITY PATCH
      thinking:
        - Encoding the before/after patch context…
        - Generating a plain-language change explanation…
        - Aligning code, commit message, and explanation with PT-Former…
        - Comparing the representation against security-patch prototypes…
      output:
        - "- Path target = output.resolve(entry.getName());"
        - "+ Path target = output.resolve(entry.getName()).normalize();"
        - "+ if (!target.startsWith(output)) throw new IOException(\"invalid entry\");"
        - ""
        - "generated explanation: constrain archive entries to the destination directory"
        - "mock security probability: 0.94"
      explanation: >-
        The mock explanation exposes the security intent even though the
        fictional commit message says only “harden extraction.” The simulated
        classifier therefore surfaces it for analyst review.
    - label: Rename cache fields
      file: src/cache/EntryStore.java
      pattern: Mock verdict · NON-SECURITY
      thinking:
        - Encoding the small refactoring diff…
        - Generating an explanation of identifier changes…
        - Checking for behavior-changing security semantics…
        - Producing a contrastive similarity score…
      output:
        - "- private Map<Key, Value> records;"
        - "+ private Map<Key, Value> entries;"
        - ""
        - "generated explanation: rename the cache backing field for clarity"
        - "mock security probability: 0.07"
      explanation: >-
        This fictional negative example changes vocabulary but not behavior.
        The mock model keeps it out of the silent-security-patch queue.
    - label: Bound token lifetime
      file: src/auth/ResetTokens.java
      pattern: Mock verdict · SECURITY PATCH
      thinking:
        - Reading the token-generation and validation changes…
        - Generating a behavioral summary…
        - Aligning expiry-related code with the terse commit description…
        - Estimating security relevance from the fused representation…
      output:
        - "+ Instant expiresAt = clock.instant().plus(Duration.ofMinutes(15));"
        - "+ store.put(hash(token), new ResetRecord(userId, expiresAt));"
        - "+ if (record.expiresAt().isBefore(clock.instant())) return INVALID;"
        - ""
        - "generated explanation: add creation-time expiry and reject stale reset tokens"
        - "mock security probability: 0.89"
      explanation: >-
        The mock commit contains no vulnerability identifier, yet its code and
        generated explanation indicate a security-relevant lifetime bound. It
        illustrates the silent-patch triage use case without claiming a real
        LLMDA prediction.
