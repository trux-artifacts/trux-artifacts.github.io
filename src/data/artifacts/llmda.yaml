name: LLMDA
type: tool
area: Patches & Program Repair
description: >-
  Just-in-time detection of silent security patches — augments patches with
  LLM-generated explanations, aligns code and text representations
  (PT-Former), and classifies security relevance with a
  similarity-based contrastive layer.
authors:
  - Xunzhu Tang
  - Kisub Kim
  - Saad Ezzini
  - Yewei Song
  - Haoye Tian
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
logo: repair
figure: llmda.png
figureCaption: Overview of LLMDA (TOSEM 2026 paper, Figure 1)
paper:
  title: "Just-in-Time Detection of Silent Security Patches"
  venue: TOSEM
  year: 2026
  doi: 10.1145/3749370
links:
  website: https://llmda.github.io
  resources:
    - label: Dataset (Zenodo)
      url: https://zenodo.org/records/11652295
    - label: Source code (Zenodo)
      url: https://zenodo.org/records/11636137
tags:
  - security-patches
  - llm
  - vulnerabilities
demo:
  style: terminal
  intro: >-
    Explore aggregate results published on the official LLMDA project page for
    PatchDB and SPI-DB, plus the reported contribution of PT-Former.
  outputLabel: Paper-reported results
  countOutput: false
  note: >-
    Results explorer only — these values are copied from the authors' project
    page and are not recomputed in the browser. The full dataset and source code
    are available through the Zenodo links above.
  scenarios:
    - label: Overall classification
      query: "RQ1 · silent security-patch identification"
      thinking:
        - Reading the aggregate performance reported by the project page.
      output:
        - "Overall F1 reported for LLMDA: 78.19%"
        - "Improvement over GraphSPD: up to ~42% on PatchDB and ~20% on SPI-DB"
      explanation: >-
        LLMDA combines generated explanations, code/text alignment, and
        contrastive learning to distinguish security-relevant patches from
        ordinary changes.
    - label: PT-Former ablation
      query: "RQ2 · remove the PT-Former alignment module"
      thinking:
        - Reading the ablation result reported by the project page.
      output:
        - "Reported F1 change: approximately -8 percentage points"
        - "Interpretation: multimodal alignment contributes materially to classification performance."
      explanation: >-
        The ablation isolates the module that aligns patch, explanation, and
        description embeddings before contrastive classification.
