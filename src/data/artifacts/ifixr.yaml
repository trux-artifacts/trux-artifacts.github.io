tags:
  - program-repair
  - bug-reports
  - java
demo:
  style: patch
  intro: >-
    Pick a fictional bug report to preview iFixR's repair loop: retrieve
    suspicious statements from the report, instantiate fix patterns, validate
    candidates with regression tests, and rank the surviving patches.
  note: >-
    Interactive simulation only — iFixR is not executed in the browser. Bug
    reports, source files, suspiciousness values, candidates, rankings, and test
    outcomes below are fictional and are not cases or measurements from the
    paper.
  scenarios:
    - label: Empty chart series
      file: src/chart/SeriesRenderer.java
      pattern: Bug-report-driven null guard
      thinking:
        - Indexing the mock bug report for code entities and failure terms…
        - Ranking statements related to empty series and legend rendering…
        - Instantiating null-check and conditional fix patterns…
        - Running the failing test, then the regression suite…
      output:
        - "@@ -118,6 +118,9 @@ LegendItem createLegend(Series series) {"
        - "+    if (series == null || series.isEmpty()) {"
        - "+        return LegendItem.empty();"
        - "+    }"
        - "     return new LegendItem(series.getName(), series.getColor());"
      explanation: >-
        In this mock run, report terms steer localization toward legend
        creation. Candidate #4 passes 1 previously failing test plus 612
        simulated regression tests and is ranked first.
    - label: Endpoint root rejected
      file: src/math/BracketSolver.java
      pattern: Conditional-boundary mutation
      thinking:
        - Matching the report phrase “root exactly at lower bound”…
        - Localizing the interval validation condition…
        - Generating comparison-operator mutations…
        - Rejecting candidates that break non-bracketing inputs…
      output:
        - "@@ -74,7 +74,7 @@ double solve(Function f, double min, double max) {"
        - "     double left = f.value(min);"
        - "     double right = f.value(max);"
        - "-    if (left * right >= 0) {"
        - "+    if (left * right > 0) {"
        - "         throw new NoBracketingException();"
      explanation: >-
        The simulated candidate preserves the error for same-sign endpoints but
        accepts zero at either bound. Mock validation reports 824/824 tests
        passing and ranks it above two overfitting candidates.
    - label: Wrong fallback value
      file: src/config/TimeoutParser.java
      pattern: Mutate Return Statement
      thinking:
        - Extracting “invalid timeout resets to zero” from the mock report…
        - Retrieving the parser and its fallback return statement…
        - Ranking return-value mutations using report vocabulary…
        - Validating invalid, missing, and valid timeout inputs…
      output:
        - "@@ -39,7 +39,7 @@ int parseTimeout(String value) {"
        - "     try {"
        - "         return Integer.parseInt(value);"
        - "     } catch (NumberFormatException error) {"
        - "-        return 0;"
        - "+        return DEFAULT_TIMEOUT;"
        - "     }"
      explanation: >-
        This fictional run uses iFixR's supported Mutate Return Statement
        pattern. Bug-report terms guide the ranking toward the fallback branch;
        the top mock patch passes 218/218 simulated tests.
