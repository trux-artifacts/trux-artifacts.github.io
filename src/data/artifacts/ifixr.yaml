name: iFixR
type: tool
area: Patches & Program Repair
description: >-
  Bug-report-driven automated program repair: iFixR uses bug reports for
  information-retrieval-based fault localization, generates candidate patches
  from fix patterns, validates them with regression tests, and ranks the
  resulting patches for developers.
