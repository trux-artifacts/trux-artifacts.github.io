name: TaskFlow
type: tool
area: Android Static & Dynamic Analysis
description: >-
  An LLM-driven framework that generates task-specific lists of SOURCE
  methods for Android taint analysis, replacing static generic lists with
  specifications tailored to the analysis goal.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Marc Miltenberger
  - Steven Arzt
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: taskflow.png
figureCaption: Overview of the TaskFlow approach, illustrating the two main phases (TOSEM 2026 paper, Figure 1)
paper:
  title: "TaskFlow: LLMs for Android Taint Specification"
  venue: TOSEM
  year: 2026
  doi: 10.1145/3815184
links:
  github: https://github.com/Trustworthy-Software/TaskFlow
tags:
  - android
  - taint-analysis
  - llm
  - sources-and-sinks
demo:
  intro: >-
    Describe an Android taint-analysis task. TaskFlow filters, embeds, clusters
    and refines framework methods into a focused SOURCE list for that specific
    question.
  outputLabel: Task-specific SOURCE methods
  note: >-
    Simulated preview using representative fictional task requests and method
    lists; no notebook or model runs in the browser. The pipeline stages follow
    the public artifact, but these exact lists are illustrative and are not
    outputs or quantitative results reported by the paper.
  scenarios:
    - label: Location tracking
      query: Generate Android SOURCE methods for tracking precise and coarse location data
      thinking:
        - Filtering documented public Android methods…
        - Reusing embeddings and cluster labels from the offline stages…
        - Selecting clusters semantically related to location…
        - Refining candidates against the requested analysis task…
      output:
        - android.location.Location.getLatitude()
        - android.location.Location.getLongitude()
        - android.location.Location.getAltitude()
        - android.location.LocationManager.getLastKnownLocation(String)
        - android.location.LocationManager.getCurrentLocation(...)
        - android.telephony.TelephonyManager.getCellLocation()
      explanation: >-
        This fictional output narrows the framework to methods that can expose
        coordinates or location proxies, ready for a task-specific source list.
    - label: SMS content and metadata
      query: Generate Android SOURCE methods for reading SMS bodies, senders and inbox records
      thinking:
        - Filtering the Android API inventory…
        - Retrieving messaging-related semantic clusters…
        - Distinguishing data-returning methods from messaging actions…
        - Ranking the remaining SOURCE candidates…
      output:
        - android.telephony.SmsMessage.getMessageBody()
        - android.telephony.SmsMessage.getDisplayMessageBody()
        - android.telephony.SmsMessage.getOriginatingAddress()
        - android.telephony.SmsMessage.getTimestampMillis()
        - android.content.ContentResolver.query(Telephony.Sms.Inbox.CONTENT_URI,...)
      explanation: >-
        The simulated list focuses on methods and providers that reveal message
        content or metadata, excluding sinks such as sendTextMessage().
    - label: Persistent device identifiers
      query: Generate Android SOURCE methods for device, SIM and network identifiers
      thinking:
        - Matching the task to identifier-oriented clusters…
        - Inspecting method documentation and signatures…
        - Removing generic configuration getters…
        - Refining a compact set of identifier sources…
      output:
        - android.telephony.TelephonyManager.getImei()
        - android.telephony.TelephonyManager.getSubscriberId()
        - android.telephony.TelephonyManager.getSimSerialNumber()
        - android.net.wifi.WifiInfo.getMacAddress()
        - android.provider.Settings.Secure.getString(ContentResolver, ANDROID_ID)
      explanation: >-
        This representative fictional result illustrates how a broad privacy
        objective becomes a reusable source specification rather than a fixed
        generic list.
