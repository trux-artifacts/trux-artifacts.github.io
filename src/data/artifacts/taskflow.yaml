name: TaskFlow
type: tool
area: Android Static & Dynamic Analysis
description: >-
  An LLM-driven framework that generates task-specific lists of SOURCE
  methods for Android taint analysis, replacing static generic lists with
  specifications tailored to the analysis goal.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Marc Miltenberger
  - Steven Arzt
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: taskflow.png
figureCaption: Overview of the TaskFlow approach, illustrating the two main phases (TOSEM 2026 paper, Figure 1)
paper:
  title: "TaskFlow: LLMs for Android Taint Specification"
  venue: TOSEM
  year: 2026
  doi: 10.1145/3815184
links:
  github: https://github.com/Trustworthy-Software/TaskFlow
tags:
  - android
  - taint-analysis
  - llm
  - sources-and-sinks
demo:
  style: terminal
  intro: >-
    TaskFlow is released as an ordered notebook pipeline that narrows Android
    framework methods into task-specific SOURCE lists.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    This preview follows the official repository structure. It does not present
    manually assembled method lists as if they were TaskFlow outputs.
  scenarios:
    - label: Prepare the environment
      query: conda env create -f environment.yml
      thinking:
        - Install the dependencies pinned by the released environment file.
        - Activate the environment documented by the repository.
      output:
        - "Official setup workflow — not executed by this website."
      explanation: >-
        The notebooks require the released Python environment before their
        preprocessing and refinement stages can run.
    - label: Run the notebooks in order
      query: InitialFiltering → MethodsEmbedding → MethodsClustering → ClustersLabelling → TaskSpecificRefining
      thinking:
        - Filter the documented Android API methods.
        - Embed and cluster the remaining methods.
        - Label clusters, then refine them for the target analysis task.
      output:
        - "Official notebook order — not executed by this website."
        - "Task-specific SOURCE methods are produced only by a real configured run."
      explanation: >-
        The ordered stages mirror the public artifact without inventing a result
        list for location, SMS or device identifiers.
