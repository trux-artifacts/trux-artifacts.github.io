name: LuxInstruct
type: dataset
area: Multilingual NLP & LLMs
description: >-
  A cross-lingual instruction-tuning dataset built without machine translation
  into Luxembourgish. It combines reverse-instruction generation over
  Luxembourgish Wikipedia, aligned RTL news tasks, cross-lingual paraphrasing,
  and dictionary-derived lexical tasks to preserve linguistic and cultural
  nuance while adapting LLMs to Luxembourgish.
authors:
  - Fred Philippy
  - Laura Bernardy
  - Siwen Guo
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: stable
logo: llm
paper:
  title: "LuxInstruct: A Cross-Lingual Instruction Tuning Dataset For Luxembourgish"
  venue: KONVENS
  year: 2026
  url: https://openreview.net/forum?id=b2JHITDlzU
links:
  resources:
    - label: Dataset (Hugging Face)
      url: https://huggingface.co/datasets/fredxlpy/LuxInstruct
tags:
  - nlp
  - instruction-tuning
  - luxembourgish
  - cross-lingual
  - low-resource
dataset:
  stats:
    - value: 537344
      label: Total pairs described, including RTL-restricted tasks
    - value: 400029
      label: Publicly released pairs (paper/model-card table)
    - value: 7
      label: Task types
    - value: 3
      label: Aligned source languages (EN · FR · DE)
    - value: 0
      animate: false
      label: Luxembourgish outputs created by machine translation
    - value: 400000
      label: Luxembourgish speakers worldwide
  sampleTitle: Task types
  sampleCount: 7
  sampleNote: >-
    The dataset is assembled from these cross-lingual tasks — no Luxembourgish
    text is machine-translated into the training data.
  samples:
    - "Open-Ended · reverse-instruction pairs from Luxembourgish Wikipedia"
    - "Article-To-Title · generate a headline from an RTL news article"
    - "Title-To-Article · draft an article from a headline"
    - "CL-Paraphrase · cross-lingual paraphrasing built on LuxAlign"
    - "Word-To-Example · generate a Luxembourgish example sentence from a word and translation"
    - "Colloquial-To-Standard · rewrite colloquial Luxembourgish in standard form"
    - "Word-Translation · translate a source-language word into Luxembourgish"
  usage:
    title: Load the dataset
    note: >-
      The public Hub release excludes Article-To-Title and Title-To-Article
      because the RTL news data must be obtained from the original provider.
      The paper/model-card table counts 400,029 public pairs; the Hub row counter
      may differ slightly as the hosted dataset evolves.
    code: |
      from datasets import load_dataset

      ds = load_dataset("fredxlpy/LuxInstruct")
