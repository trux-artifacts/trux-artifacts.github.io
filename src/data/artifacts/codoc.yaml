name: CoDoC
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Identifies privacy-sensitive SOURCE and SINK methods in the Android framework
  by fusing two views of each method — its source code (embedded with Code2Vec)
  and its JavaDoc documentation (embedded with Sentence-BERT) — and classifying
  it as SOURCE, SINK, or NEITHER for taint-analysis lists.
authors:
  - Jordan Samhi
  - Maria Kober
  - Abdoul Kader Kaboré
  - Steven Arzt
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-10'
logo: android
figure: codoc.png
figureCaption: Overview of the CoDoC approach (SANER 2023 paper, Figure 3)
paper:
  title: "Negative Results of Fusing Code and Documentation for Learning to Accurately Identify Sensitive Source and Sink Methods: An Application to the Android Framework for Data Leak Detection"
  venue: SANER
  year: 2023
  doi: 10.1109/SANER56733.2023.00091
links:
  github: https://github.com/JordanSamhi/CoDoC
tags:
  - android
  - sources-and-sinks
  - taint-analysis
  - deep-learning
  - negative-results
demo:
  intro: >-
    CoDoC decides whether an Android framework method is a privacy-sensitive
    SOURCE, a SINK, or NEITHER — by fusing two views of the method: its source
    code (embedded with Code2Vec) and its JavaDoc documentation (embedded with
    Sentence-BERT). Pick a method to see the classifier's verdict. The last two
    are false positives documented in the paper's negative-results analysis.
  outputLabel: Method under classification (code + JavaDoc)
  countOutput: false
  note: >-
    A "negative results" study. In 10-fold cross-validation CoDoC reaches
    precision / recall / F1 = 91%, beating the state-of-the-art SuSi. But on
    unseen Android framework methods it over-flags and produces many false
    positives — machine learning struggles to pin down an abstract concept like
    "privacy" in practice. The cases are documented by the paper; source and
    JavaDoc snippets are shortened for display and no confidence score is
    invented. Nothing runs in your browser. Open-source prototype and artifacts
    are available on GitHub.
  scenarios:
    - label: getImei() → SOURCE
      query: 'Classify android.telephony.TelephonyManager.getImei()'
      thinking:
        - Filtering to documented public methods…
        - Extracting source code + JavaDoc…
        - Embedding source code (Code2Vec)…
        - Embedding documentation (Sentence-BERT)…
        - Fusing embeddings → classifier…
      output:
        - 'public String getImei() {'
        - '    return getImei(getSlotIndex());'
        - '}'
        - 'JavaDoc: "Returns the IMEI (International Mobile Equipment Identity)."'
      verdictAnswer: "SOURCE"
      verdictLabel: documented SOURCE example
      verdictKind: correct
      explanation: >-
        getImei() returns a device identifier — sensitive data under CoDoC's
        SOURCE definition. The code (returns an identifier) and the documentation
        (mentions the IMEI) point the same way, and CoDoC classifies it SOURCE. A
        correct call.
    - label: sendTextMessage() → SINK
      query: 'Classify android.telephony.SmsManager.sendTextMessage(...)'
      thinking:
        - Filtering to documented public methods…
        - Extracting source code + JavaDoc…
        - Embedding source code (Code2Vec)…
        - Embedding documentation (Sentence-BERT)…
        - Fusing embeddings → classifier…
      output:
        - 'public void sendTextMessage(String destinationAddress,'
        - '        String scAddress, String text, ...) {'
        - '    // dispatch the SMS to the radio interface'
        - '}'
        - 'JavaDoc: "Send a text based SMS."'
      verdictAnswer: "SINK"
      verdictLabel: documented SINK example
      verdictKind: correct
      explanation: >-
        sendTextMessage() pushes data out of the app to the outside (the cellular
        network), which is exactly CoDoC's definition of a SINK. Correctly
        classified.
    - label: describeContents() → SOURCE (FP)
      query: 'Classify android.bluetooth.BluetoothCodecStatus.describeContents()'
      thinking:
        - Filtering to documented public methods…
        - Extracting source code + JavaDoc…
        - Embedding source code (Code2Vec)…
        - Embedding documentation (Sentence-BERT)…
        - Fusing embeddings → classifier…
      output:
        - 'public int describeContents() {'
        - '    return 0;'
        - '}'
        - 'Behavior: returns a constant describing Parcelable contents.'
      verdictAnswer: "SOURCE"
      verdictLabel: documented false positive
      verdictKind: incorrect
      explanation: >-
        The method merely returns 0 and exposes no private information, so its
        correct label is NEITHER. The paper reports it among CoDoC's false
        positives on unseen Android framework methods.
    - label: FastMath.round(float) → SINK (FP)
      query: 'Classify com.android.internal.util.FastMath.round(float)'
      thinking:
        - Filtering to documented public methods…
        - Extracting source code + JavaDoc…
        - Embedding source code (Code2Vec)…
        - Embedding documentation (Sentence-BERT)…
        - Fusing embeddings → classifier…
      output:
        - 'public static int round(float value) {'
        - '    return (int) (value + 0.5f);'
        - '}'
        - 'Behavior: rounds a floating-point value; no data leaves the device.'
      verdictAnswer: "SINK"
      verdictLabel: documented false positive
      verdictKind: incorrect
      explanation: >-
        This helper only rounds a number, so the correct label is NEITHER; it is
        not a channel through which data leaves the app. The paper documents its
        SINK prediction as another false positive illustrating why the 91% F1
        seen in cross-validation does not transfer cleanly to unseen APIs.
