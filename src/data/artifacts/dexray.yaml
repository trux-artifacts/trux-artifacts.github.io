name: DexRay
type: tool
area: Android Security & Malware
description: >-
  A simple yet effective image-based Android malware detector. It converts an
  app's DEX bytecode into a grey-scale "vector" image — one pixel per byte — and
  feeds it to a 1-dimensional CNN that predicts malware or goodware, with no
  hand-crafted features.
authors:
  - Nadia Daoudi
  - Jordan Samhi
  - Abdoul Kader Kaboré
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: dexray.png
figureCaption: DexRay basic building blocks (MLHat 2021 paper, Figure 1)
paper:
  title: "DexRay: A Simple, yet Effective Deep Learning Approach to Android Malware Detection based on Image Representation of Bytecode"
  venue: MLHat @ KDD
  year: 2021
  doi: 10.1007/978-3-030-87839-9_4
links:
  github: https://github.com/Trustworthy-Software/DexRay
tags:
  - android
  - malware
  - deep-learning
  - image-representation
demo:
  style: terminal
  intro: >-
    DexRay first converts APK bytecode into its one-dimensional image
    representation, then runs the released classifier over a directory of
    generated images.
  outputLabel: Documented commands
  countOutput: false
  note: >-
    Commands are copied from the official repository README. Nothing runs in
    the browser and no malware verdict or model score is simulated.
  scenarios:
    - label: Convert an APK to an image
      query: python3 apktoimage.py APK DESTINATION
      thinking:
        - Read the APK's DEX bytecode.
        - Encode its bytes into the representation consumed by DexRay.
      output:
        - "Official README command — not executed by this website."
        - "Replace APK and DESTINATION with local paths."
      explanation: >-
        This preprocessing step creates the model input without claiming a
        prediction for an invented application.
    - label: Run the released classifier
      query: python3 DexRay.py -p "dataset_images" -d "results_dir" -f "results_dir/scores.txt"
      thinking:
        - Load image inputs from dataset_images.
        - Write experiment artifacts and scores to the selected result paths.
      output:
        - "Official README command — not executed by this website."
        - "Predictions depend on the real local dataset and trained model."
      explanation: >-
        Researchers can reproduce the classifier workflow locally; the catalog
        deliberately reports no synthetic verdict.
