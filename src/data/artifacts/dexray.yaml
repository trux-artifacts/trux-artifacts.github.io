name: DexRay
type: tool
area: Android Security & Malware
description: >-
  A simple yet effective image-based Android malware detector. It converts an
  app's DEX bytecode into a grey-scale "vector" image — one pixel per byte — and
  feeds it to a 1-dimensional CNN that predicts malware or goodware, with no
  hand-crafted features.
authors:
  - Nadia Daoudi
  - Jordan Samhi
  - Abdoul Kader Kaboré
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: dexray.png
figureCaption: DexRay basic building blocks (MLHat 2021 paper, Figure 1)
paper:
  title: "DexRay: A Simple, yet Effective Deep Learning Approach to Android Malware Detection based on Image Representation of Bytecode"
  venue: MLHat @ KDD
  year: 2021
  doi: 10.1007/978-3-030-87839-9_4
links:
  github: https://github.com/Trustworthy-Software/DexRay
tags:
  - android
  - malware
  - deep-learning
  - image-representation
demo:
  style: image
  intro: >-
    Pick an APK profile. DexRay maps every DEX byte to one grey-scale pixel,
    resizes the resulting one-dimensional representation, and sends it through
    the CNN for a malware/goodware verdict.
  note: >-
    Simulated preview using procedurally generated images and representative
    fictional APKs; nothing runs in the browser and no model is called. The
    displayed textures, sigmoid scores and verdicts are illustrative UI output,
    not per-app results or measurements reported by the paper.
  scenarios:
    - label: Banking trojan
      seed: 419733
      thinking:
        - Extracting classes.dex and classes2.dex from the fictional APK…
        - Concatenating their raw byte streams…
        - Mapping each byte to an 8-bit grey pixel…
        - Resizing the sequence to the classifier input length…
        - Simulating the released CNN's sigmoid output…
      verdictAnswer: MALWARE
      verdictLabel: simulated score 0.98
      verdictKind: malware
      explanation: >-
        The generated high-contrast texture and 0.98 score are fictional. The
        mock demonstrates the simple decision rule: a sigmoid value at or above
        0.5 is displayed as malware.
    - label: Weather app
      seed: 880145
      thinking:
        - Reading the fictional app's DEX bytecode…
        - Converting the byte sequence to grey-scale pixels…
        - Normalizing the one-dimensional image…
        - Simulating inference with the binary classifier…
      verdictAnswer: GOODWARE
      verdictLabel: simulated score 0.03
      verdictKind: goodware
      explanation: >-
        This representative benign app is assigned a fictional 0.03 score,
        below the 0.5 threshold, so the UI renders a GOODWARE verdict.
    - label: Obfuscated malware
      seed: 271828
      thinking:
        - Extracting the fictional obfuscated bytecode…
        - Mapping bytes to pixels after renaming and string-encryption passes…
        - Resizing the altered texture…
        - Simulating the CNN prediction…
      verdictAnswer: MALWARE
      verdictLabel: simulated score 0.86
      verdictKind: malware
      explanation: >-
        The generated image mimics how obfuscation can alter a byte-level
        texture while leaving a high mock score. It illustrates the evaluation
        question without claiming this APK or score appears in the paper.
