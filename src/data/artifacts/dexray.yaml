name: DexRay
type: tool
area: Android Security & Malware
description: >-
  A simple yet effective image-based Android malware detector. It converts an
  app's DEX bytecode into a grey-scale "vector" image — one pixel per byte — and
  feeds it to a 1-dimensional CNN that predicts malware or goodware, with no
  hand-crafted features.
authors:
  - Nadia Daoudi
  - Jordan Samhi
  - Abdoul Kader Kaboré
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: dexray.png
figureCaption: DexRay basic building blocks (MLHat 2021 paper, Figure 1)
paper:
  title: "DexRay: A Simple, yet Effective Deep Learning Approach to Android Malware Detection based on Image Representation of Bytecode"
  venue: MLHat @ KDD
  year: 2021
  doi: 10.1007/978-3-030-87839-9_4
links:
  github: https://github.com/Trustworthy-Software/DexRay
tags:
  - android
  - malware
  - deep-learning
  - image-representation
demo:
  style: image
  intro: >-
    DexRay turns an app's DEX bytecode into a grey-scale image — each byte
    becomes one pixel — and feeds it to a 1-dimensional CNN that outputs a single
    sigmoid score: malware if ≥ 0.5, goodware if < 0.5. No hand-crafted features,
    no manual feature engineering. Pick an app to watch its bytecode become an
    image, then read the CNN's verdict.
  note: >-
    Illustrative apps with procedurally generated bytecode images that mimic the
    look of real DEX-to-grey representations — nothing runs in your browser and
    no model is called. DexRay's real 1-D CNN (kernel size 12, two conv/pool
    layers, sigmoid output) reaches F1 = 0.96 on 158k+ AndroZoo apps and stays
    robust under obfuscation. Run it from the repository.
  scenarios:
    - label: Malware · banking trojan
      seed: 419733
      thinking:
        - Extracting DEX bytecode from the APK…
        - Concatenating all DEX files into one byte stream…
        - Mapping each byte to an 8-bit grey pixel…
        - Resizing to 128 × 128…
        - Running the 1-D CNN…
      verdictAnswer: MALWARE
      verdictLabel: sigmoid score 0.98
      verdictKind: malware
      explanation: >-
        The banking trojan's bytecode yields a dense, high-contrast image. The
        1-D CNN scores it 0.98 — well above the 0.5 threshold — so DexRay flags
        it as malware, from raw bytes alone, with no features hand-engineered by
        an analyst.
    - label: Benign · weather app
      seed: 880145
      thinking:
        - Extracting DEX bytecode from the APK…
        - Concatenating all DEX files into one byte stream…
        - Mapping each byte to an 8-bit grey pixel…
        - Resizing to 128 × 128…
        - Running the 1-D CNN…
      verdictAnswer: GOODWARE
      verdictLabel: sigmoid score 0.03
      verdictKind: goodware
      explanation: >-
        A benign weather app: the CNN scores its bytecode image 0.03, far below
        the threshold, so DexRay labels it goodware. Nothing about the app has to
        be decompiled or reverse-engineered — the byte stream is enough.
    - label: Malware · obfuscated
      seed: 271828
      thinking:
        - Extracting DEX bytecode from the APK…
        - Concatenating all DEX files into one byte stream…
        - Mapping each byte to an 8-bit grey pixel…
        - Resizing to 128 × 128…
        - Running the 1-D CNN…
      verdictAnswer: MALWARE
      verdictLabel: sigmoid score 0.86
      verdictKind: malware
      explanation: >-
        This malware was first run through the Obfuscapk obfuscator (class and
        method renaming, string encryption, call indirection). The image texture
        shifts, but the CNN still scores it 0.86 and catches it — an illustration
        of DexRay's resilience to obfuscation studied in the paper (RQ4).
    - label: Benign · note-taking app
      seed: 161803
      thinking:
        - Extracting DEX bytecode from the APK…
        - Concatenating all DEX files into one byte stream…
        - Mapping each byte to an 8-bit grey pixel…
        - Resizing to 128 × 128…
        - Running the 1-D CNN…
      verdictAnswer: GOODWARE
      verdictLabel: sigmoid score 0.05
      verdictKind: goodware
      explanation: >-
        A simple note-taking app: scored 0.05, comfortably goodware. DexRay
        reaches an F1-score of 0.96 across 158k+ apps with this deliberately
        minimal design — the paper's point is that such a basic pipeline is
        already a strong baseline.
