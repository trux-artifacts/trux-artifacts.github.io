name: TSOpen
type: tool
area: Android Security & Malware
description: >-
  Open-source implementation of trigger-based behavior detection (logic bombs)
  in Android apps, built on top of Soot and FlowDroid.
authors:
  - Jordan Samhi
  - Alexandre Bartel
logo: android
status: stable
figure: tsopen.png
figureCaption: Overview of the TSOpen analysis pipeline (IEEE TDSC paper, Figure 1)
paper:
  title: "On the (In)Effectiveness of Static Logic Bomb Detection for Android Apps"
  venue: IEEE TDSC
  year: 2022
  doi: 10.1109/TDSC.2021.3108057
links:
  github: https://github.com/JordanSamhi/TSOpen
  download: https://github.com/JordanSamhi/TSOpen/releases/latest/download/TSOpen.jar
tags:
  - android
  - logic-bombs
  - malware
  - static-analysis
demo:
  style: terminal
  intro: >-
    TSOpen statically detects logic bombs — sensitive operations hidden behind a
    trigger condition. For each suspicious guard it symbolically recovers the
    trigger predicate (#now for time, #location, #sms) and reports it. Pick an
    app to see TSOpen's real console output. TSOpen models three trigger types:
    time, location and SMS.
  outputLabel: TSOpen output
  countOutput: false
  note: >-
    This result block is real output produced by TSOpen on a ground-truth
    sample. TSOpen is an open implementation of TriggerScope built on Soot and
    FlowDroid — nothing runs in your browser.
  scenarios:
    - label: holycolbert10.apk (real)
      query: java -jar TSOpen.jar -p ~/Android-platforms/jars/stubs/ -f holycolbert10.apk
      thinking:
        - Loading the APK and Android platform…
        - Constructing the call graph…
        - Extracting simple block and path predicates…
        - Running symbolic execution…
        - Recovering potential logic bombs…
      output:
        - 'Potential Logic Bombs found :'
        - '----------------------------------------------------------------'
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 1'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 57'
        - '- Nested                    : Yes'
        - '- Predicate                 : (#now | #sms/#sender.matches("05212011")) (#Suspicious)'
        - '----------------------------------------------------------------'
        - ''
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 2'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 34'
        - '- Nested                    : Yes'
        - '- Predicate                 : (#sms/#body.matches("health")) (#Suspicious)'
        - '----------------------------------------------------------------'
        - ''
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 1'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 60'
        - '- Nested                    : No'
        - '- Predicate                 : ((android.database.Cursor.getString(0)).matches("endoftheworld")) (#Suspicious)'
        - '----------------------------------------------------------------'
      explanation: >-
        Real output on a ground-truth sample. TSOpen finds three suspicious
        triggers in the same onReceive handler, each guarding a call to
        abortBroadcast() — used to silently swallow the incoming SMS. The
        recovered predicates read symbolically: the current time (#now) OR the
        SMS sender matching a number, the SMS body matching "health", and a
        database value matching "endoftheworld". Every guard is marked
        #Suspicious.
