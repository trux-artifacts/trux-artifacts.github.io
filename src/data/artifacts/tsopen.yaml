name: TSOpen
type: tool
area: Android Security & Malware
description: >-
  Open-source implementation of trigger-based behavior detection (logic bombs)
  in Android apps, built on top of Soot and FlowDroid.
cardDescription: Detects trigger-based behaviors and logic bombs in Android apps with static analysis.
authors:
  - Jordan Samhi
  - Alexandre Bartel
logo: android
addedAt: '2026-07-06'
figure: tsopen.png
figureCaption: Overview of the TSOpen analysis pipeline (IEEE TDSC paper, Figure 1)
paper:
  title: "On the (In)Effectiveness of Static Logic Bomb Detection for Android Apps"
  venue: IEEE TDSC
  year: 2022
  doi: 10.1109/TDSC.2021.3108057
links:
  github: https://github.com/JordanSamhi/TSOpen
  download: https://github.com/JordanSamhi/TSOpen/releases/latest/download/TSOpen.jar
tags:
  - android
  - logic-bombs
  - malware
  - static-analysis
demo:
  style: terminal
  intro: >-
    TSOpen statically detects logic bombs — sensitive operations hidden behind a
    trigger condition. For each suspicious guard it symbolically recovers the
    trigger predicate (#now for time, #location, #sms) and reports it. Pick an
    app to see TSOpen's real console output. TSOpen models three trigger types:
    time, location and SMS.
  outputLabel: TSOpen output
  countOutput: false
  note: >-
    The holycolbert10 result is real output produced by TSOpen on a ground-truth
    sample. The other two cases are Simulated previews using representative
    fictional inputs, predicates and timings; they are not paper results.
    TSOpen is built on Soot and FlowDroid, and nothing runs in the browser.
  scenarios:
    - label: holycolbert10.apk (real)
      query: java -jar TSOpen.jar -p ~/Android-platforms/jars/stubs/ -f holycolbert10.apk
      thinking:
        - Loading the APK and Android platform…
        - Constructing the call graph…
        - Extracting simple block and path predicates…
        - Running symbolic execution…
        - Recovering potential logic bombs…
      output:
        - 'Potential Logic Bombs found :'
        - '----------------------------------------------------------------'
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 1'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 57'
        - '- Nested                    : Yes'
        - '- Predicate                 : (#now | #sms/#sender.matches("05212011")) (#Suspicious)'
        - '----------------------------------------------------------------'
        - ''
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 2'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 34'
        - '- Nested                    : Yes'
        - '- Predicate                 : (#sms/#body.matches("health")) (#Suspicious)'
        - '----------------------------------------------------------------'
        - ''
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : com.YahwehOrNoWay.SMSsmack'
        - '- Method                    : onReceive'
        - '- Starting Component        : BroadcastReceiver'
        - '- Ending Component          : BroadcastReceiver'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 1'
        - '- Sensitive method          : <android.content.BroadcastReceiver: void abortBroadcast()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 60'
        - '- Nested                    : No'
        - '- Predicate                 : ((android.database.Cursor.getString(0)).matches("endoftheworld")) (#Suspicious)'
        - '----------------------------------------------------------------'
      explanation: >-
        Real output on a ground-truth sample. TSOpen finds three suspicious
        triggers in the same onReceive handler, each guarding a call to
        abortBroadcast() — used to silently swallow the incoming SMS. The
        recovered predicates read symbolically: the current time (#now) OR the
        SMS sender matching a number, the SMS body matching "health", and a
        database value matching "endoftheworld". Every guard is marked
        #Suspicious.
    - label: Hardcoded time trigger (simulated)
      query: java -jar TSOpen.jar -p ~/Android-platforms/jars/stubs/ -f lab.battery.apk
      thinking:
        - Building the fictional APK's call graph…
        - Extracting block and path predicates…
        - Symbolically resolving the current-time comparison…
        - Matching the guarded branch with a sensitive operation…
      output:
        - 'Potential Logic Bombs found :'
        - '----------------------------------------------------------------'
        - '- Statement                 : if $z1 == 0'
        - '- Class                     : lab.battery.UpdateGate'
        - '- Method                    : onResume'
        - '- Starting Component        : Activity'
        - '- Ending Component          : Activity'
        - '- CallStack length          : (3)'
        - '- Size of formula           : 1'
        - '- Sensitive method          : <android.telephony.SmsManager: void sendTextMessage(...)>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 45'
        - '- Nested                    : No'
        - '- Predicate                 : (#now > 1767225600000) (#Suspicious)'
        - '----------------------------------------------------------------'
      explanation: >-
        The fictional output demonstrates TSOpen's time abstraction (#now): a
        hardcoded date controls reachability of an SMS operation, so the guard
        is surfaced as a potential logic bomb.
    - label: Location trigger (simulated)
      query: java -jar TSOpen.jar -p ~/Android-platforms/jars/stubs/ -f lab.compass.apk
      thinking:
        - Discovering the location-service callback…
        - Recovering nested latitude and longitude predicates…
        - Symbolically evaluating the guarded network branch…
        - Formatting the suspicious predicate and sensitive target…
      output:
        - 'Potential Logic Bombs found :'
        - '----------------------------------------------------------------'
        - '- Statement                 : if $z0 == 0'
        - '- Class                     : lab.compass.GeoFenceService'
        - '- Method                    : onLocationChanged'
        - '- Starting Component        : Service'
        - '- Ending Component          : Service'
        - '- CallStack length          : (2)'
        - '- Size of formula           : 2'
        - '- Sensitive method          : <java.net.URL: java.net.URLConnection openConnection()>'
        - '- Reachable                 : Yes'
        - '- Guarded Blocks Density    : 38'
        - '- Nested                    : Yes'
        - '- Predicate                 : (#location/lat > 49.5 && #location/lon < 6.4) (#Suspicious)'
        - '----------------------------------------------------------------'
      explanation: >-
        This simulated location case shows a geofence-like predicate guarding a
        network connection. The values and class are fictional; the preview
        illustrates how TSOpen renders recovered location conditions.
