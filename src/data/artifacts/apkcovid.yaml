name: APKCOVID
type: dataset
area: Android Datasets
description: >-
  A curated dataset of Android apps related to COVID-19 collected from
  Google Play, supporting the first empirical study of how the pandemic
  was reflected in mobile apps.
authors:
  - Jordan Samhi
  - Kevin Allix
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: stable
logo: android
figure: apkcovid.png
figureCaption: Dataset curation process, numbers represent numbers of apps (EMSE 2021 paper, Figure 6)
paper:
  title: "A First Look at Android Applications in Google Play Related to COVID-19"
  venue: EMSE
  year: 2021
  doi: 10.1007/s10664-021-09943-x
links:
  github: https://github.com/JordanSamhi/APKCOVID
  resources:
    - label: Archived dataset (Zenodo)
      url: https://doi.org/10.5281/zenodo.4483269
tags:
  - android
  - covid-19
  - empirical-study
dataset:
  stats:
    - value: 92
      label: COVID-19 apps
    - value: 184563
      label: apps screened
  sampleTitle: Sample apps (package names)
  sampleSource: package_names.txt
  sampleCount: 8
  sampleNote: >-
    Real package names from the dataset — recognizable government and health
    apps from around the world. The full dataset is distributed as SHA256
    hashes, resolved to APKs through AndroZoo (not hosted here).
  samples:
    - am.gov.covid19
    - au.gov.health.covidsafe
    - br.gov.datasus.guardioes
    - ca.gc.hcsc.canada.covid19
    - at.roteskreuz.stopcorona
    - bh.bahrain.corona.tracker
    - cat.gencat.mobi.StopCovid19Cat
    - ch.covid19bs.app.PMSMobile
    - co.gov.ins.guardianes
    - ar.gob.coronavirus
    - app.ceylon.selftrackingapp
    - bf.diagnoseme.fasocivic
    - com.gov.mcmc.projectcatur
    - com.agetic.coronavirusapp
    - com.edu.aku.akuhccheck
    - com.coronacheck.haugxhaug.testyourcorona
    - com.docandu.checker
    - com.Eha.covid_19
