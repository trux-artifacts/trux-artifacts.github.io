name: Difuzer
type: tool
area: Android Security & Malware
description: >-
  Uncovers suspicious hidden sensitive operations in Android apps by combining
  static taint analysis with anomaly detection on inter-procedural triggers.
authors:
  - Jordan Samhi
  - Li Li
  - Tegawendé F. Bissyandé
  - Jacques Klein
logo: android
status: stable
figure: difuzer.png
figureCaption: Overview of the Difuzer approach (ICSE 2022 paper, Figure 2)
paper:
  title: "Difuzer: Uncovering Suspicious Hidden Sensitive Operations in Android Apps"
  venue: ICSE
  year: 2022
  doi: 10.1145/3510003.3510135
links:
  github: https://github.com/JordanSamhi/Difuzer
  download: https://github.com/JordanSamhi/Difuzer/raw/master/artefacts/bin/difuzer_with_libraries.jar
tags:
  - android
  - hidden-behavior
  - anomaly-detection
demo:
  style: terminal
  intro: >-
    Run Difuzer on a real APK with the Android platforms directory and the
    timeout documented by the official repository.
  outputLabel: Documented command
  countOutput: false
  note: >-
    This is the official repository command, shown as a reproducible entry
    point. The website does not execute Difuzer or display invented triggers.
  scenarios:
    - label: Analyze an APK
      query: java -jar Difuzer/target/Difuzer-0.1-jar-with-dependencies.jar -p PATH_TO_PLATFORMS -a PATH_TO_APK -r -t 60
      thinking:
        - Resolve the selected Android platform and APK.
        - Run the released logic-bomb analysis with the documented options.
      output:
        - "Official repository command — not executed by this website."
        - "Replace the placeholder paths with local files."
      explanation: >-
        Any suspicious operations and trigger predicates must come from the
        actual APK analysis, so no illustrative application output is shown.
