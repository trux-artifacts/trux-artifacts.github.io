  sampleTitle: Top file extensions inside APKs
  sampleSource: paper, Table V
  sampleCount: 10
  sampleNote: >-
    A random draw from the study's most frequent extensions — hit shuffle for
    more. "Files" counts every occurrence across the 410,125 APKs; "in N% of
    APKs" is the share of apps containing at least one. Note the many non-Android
    code files (.js, .class, .dll) — code in apps is far from just .dex. The
    586,548 `.dex` extension count is distinct from the magic-type count above:
    extensions and detected file types do not always agree.
