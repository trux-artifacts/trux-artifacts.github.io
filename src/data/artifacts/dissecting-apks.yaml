name: Dissecting APKs
type: dataset
area: Android Datasets
description: >-
  The first large-scale empirical study dissecting the composition of Android
  apps from Google Play — cataloguing every file type inside 410,125 APKs across
  25 SDK versions (2010–2023), studying how file types and sizes evolve, and
  measuring how disguised and discrepant files (wrong extensions, APKs embedded
  in other APKs) hint at maliciousness.
authors:
  - Pedro Jesús Ruiz Jiménez
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-10'
logo: android
figure: dissecting-apks.png
figureCaption: Dataset evolution — from 22.5M AndroZoo APKs down to the 410,125 sampled for the study (paper, Figure 1)
paper:
  title: "Dissecting APKs from Google Play: Trends, Insights and Security Implications"
  venue: SANER
  year: 2025
  doi: 10.1109/SANER64311.2025.00074
links:
