name: RAML
type: tool
area: Android Security & Malware
description: >-
  Retrieval-augmented localization of malicious payloads in Android apps —
  combines LLM-generated class descriptions, vector search, and LLM
  re-ranking to pinpoint malicious classes and methods from a behavior query.
authors:
  - Tiezhu Sun
  - Marco Alecci
  - Yewei Song
  - Xunzhu Tang
  - Kisub Kim
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: raml.png
figureCaption: The overview of the RAML pipeline (ASE 2025 paper, Figure 2)
paper:
  title: "RAML: Toward Retrieval-Augmented Localization of Malicious Payloads in Android Apps"
  venue: ASE NIER
  year: 2025
  doi: 10.1109/ASE63991.2025.00351
links:
  github: https://github.com/Trustworthy-Software/RAML
tags:
  - android
  - malware
  - llm
  - retrieval-augmented
demo:
  style: terminal
  intro: >-
    RAML's released command accepts a Smali folder, one or more behavior
    identifiers, and an application name, then writes localization results for
    the configured run.
  outputLabel: Documented command
  countOutput: false
  note: >-
    This command is copied from the official repository README. The website does
    not run the model or invent classes, methods, roles or retrieval scores.
  scenarios:
    - label: Localize selected behaviors
      query: python main.py /path/to/smali/folder --behaviors 1 3 4 --app-name "app_name"
      thinking:
        - Load the selected application's Smali folder.
        - Run localization for behavior identifiers 1, 3 and 4.
      output:
        - "Official README command — not executed by this website."
        - "The repository emits run-specific result files from the configured models."
      explanation: >-
        Replace the paths, behavior identifiers and app name with real inputs.
        Exact localized classes and methods must come from that execution.
