name: RAML
type: tool
area: Android Security & Malware
description: >-
  Retrieval-augmented localization of malicious payloads in Android apps —
  combines LLM-generated class descriptions, vector search, and LLM
  re-ranking to pinpoint malicious classes and methods from a behavior query.
authors:
  - Tiezhu Sun
  - Marco Alecci
  - Yewei Song
  - Xunzhu Tang
  - Kisub Kim
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-07'
logo: android
figure: raml.png
figureCaption: The overview of the RAML pipeline (ASE 2025 paper, Figure 2)
paper:
  title: "RAML: Toward Retrieval-Augmented Localization of Malicious Payloads in Android Apps"
  venue: ASE NIER
  year: 2025
  doi: 10.1109/ASE63991.2025.00351
links:
  github: https://github.com/Trustworthy-Software/RAML
tags:
  - android
  - malware
  - llm
  - retrieval-augmented
demo:
  intro: >-
    Pick a behavior. RAML describes Smali classes, retrieves and re-ranks the
    candidates most related to the behavior, then pinpoints the methods involved
    and explains each one's role.
  outputLabel: Localized methods
  countOutput: true
  note: >-
    Simulated preview using representative fictional Smali inputs, class names,
    roles and similarity scores; no model or API is called in the browser. The
    pipeline and behavior categories follow the artifact, but these localized
    methods are illustrative and are not paper results.
  scenarios:
    - label: Privacy stealing
      query: python main.py ./samples/solitaire/smali --behaviors 1 --app-name "lab.solitaire"
      thinking:
        - Generating natural-language descriptions of the fictional Smali classes…
        - Embedding descriptions and retrieving privacy-related candidates…
        - Re-ranking the shortlist with the localization model…
        - Inspecting candidate methods and assigning analyst-readable roles…
      output:
        - "[0.96] Llab/solitaire/sync/InfoCollector;->readContacts()"
        - "       role: reads names and phone numbers through ContentResolver"
        - "[0.93] Llab/solitaire/sync/InboxReader;->collectSms()"
        - "       role: enumerates incoming-message bodies and senders"
        - "[0.88] Llab/solitaire/net/Uploader;->post([B)"
        - "       role: sends the collected records to a remote endpoint"
      explanation: >-
        The fictional result reconstructs a small collection-and-upload chain
        while showing the method-level role explanations RAML is designed to
        provide.
    - label: SMS and call abuse
      query: python main.py ./samples/player/smali --behaviors 2 --app-name "lab.player"
      thinking:
        - Describing receiver, service and networking classes…
        - Retrieving candidates related to SMS and call abuse…
        - Re-ranking across component boundaries…
        - Explaining the methods that jointly implement the behavior…
      output:
        - "[0.97] Llab/player/service/SmsAgent;->sendPremium(String)"
        - "       role: sends a text message to a premium-rate destination"
        - "[0.92] Llab/player/receiver/SmsReceiver;->onReceive(Context,Intent)"
        - "       role: intercepts incoming carrier confirmation messages"
        - "[0.87] Llab/player/receiver/SmsReceiver;->hideNotification()"
        - "       role: suppresses the user-visible confirmation"
      explanation: >-
        This representative output shows localization across a background
        service and broadcast receiver instead of returning one coarse app-level
        malware label.
    - label: Remote control
      query: python main.py ./samples/battery/smali --behaviors 3 --app-name "lab.battery"
      thinking:
        - Indexing the fictional app's Smali classes…
        - Retrieving command-and-control candidates…
        - Re-ranking polling, dispatch and persistence code…
        - Producing concise method-level explanations…
      output:
        - "[0.95] Llab/battery/net/CommandClient;->poll()"
        - "       role: periodically requests commands from the remote service"
        - "[0.91] Llab/battery/net/CommandClient;->dispatch(String)"
        - "       role: maps response strings to local actions"
        - "[0.86] Llab/battery/receiver/BootHook;->onReceive(Context,Intent)"
        - "       role: restarts command polling after device boot"
      explanation: >-
        The simulated case groups polling, dispatch and boot persistence into a
        readable behavioral chain for an analyst.
