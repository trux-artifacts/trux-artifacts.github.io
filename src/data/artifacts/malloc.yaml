demo:
  intro: >-
    MalLoc localizes malicious payloads in Android malware at method level, in
    two LLM phases. Phase 1 identifies which Smali class implements a given
    malicious behavior; Phase 2 pinpoints the exact methods inside it and gives
    each a plain-language role. The verified example below follows the
    real-world RuMMs case study documented in the paper.
  outputLabel: MalLoc localization
  countOutput: false
  note: >-
    This display is a shortened rendering of the Privacy Stealing example
    reported for RuMMs; no confidence value is invented and no model is called
    in the browser. The method-level recall of 1.00 for GPT-4.1, and the zero
    result for the single-prompt Phi-4 baseline, concern the controlled MalApp
    benchmark. On RuMMs, MalLoc reported six classes and 17 methods with 100%
    precision after manual verification and found four of five annotated
    behaviors; recall and F1 cannot be computed there. Dataset and code are on
    GitHub.
  scenarios:
    - label: Privacy Stealing
      query: MalLoc — localize "Privacy Stealing" in the RuMMs sample
      thinking:
        - Decompiling the APK to Smali (ApkTool)…
        - Phase 1 — prompting the LLM to find the malicious class…
        - Class flagged MALICIOUS; forwarding to Phase 2…
        - Phase 2 — prompting the LLM to localize methods + roles…
      output:
        - "[Phase 1]  malicious class:  Lcom/rumms/b;"
        - "[Phase 2]  methods & roles:"
        - "  Lcom/rumms/b;->f(Context): ArrayList        ·  enumerates the device contacts"
        - "  Lcom/rumms/b;->a(Context,int,String): void  ·  exfiltrates data through Intent extras and a background service"
      explanation: >-
        The paper's RuMMs example identifies obfuscated class b for Privacy
        Stealing. Its static method f(Context) enumerates contacts, while
        a(Context,int,String) forwards harvested data via Intent extras to a
        background service. These are the two method roles documented in the
        published case study.
