name: MalLoc
type: tool
area: Android Security & Malware
description: >-
  Fine-grained localization of malicious payloads in Android malware using LLMs.
  MalLoc works in two phases: Phase 1 identifies which Smali class implements a
  given malicious behavior, then Phase 2 pinpoints the exact methods inside it
  and gives each a plain-language role — going beyond coarse malware detection
  and family classification to actionable, method-level explanations.
authors:
  - Tiezhu Sun
  - Marco Alecci
  - Aleksandr Pilgun
  - Yewei Song
  - Xunzhu Tang
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-11'
logo: android
figure: malloc.png
figureCaption: The two-phase MalLoc pipeline — Phase 1 localizes the malicious class, Phase 2 the methods and their roles (ICSME 2025 paper, Figure 4)
paper:
  title: "MalLoc: Toward Fine-grained Android Malicious Payload Localization via LLMs"
  venue: ICSME
  year: 2025
  doi: 10.1109/ICSME64153.2025.00076
  url: https://jordansamhi.com/static/files/papers/malloc.pdf
links:
  github: https://github.com/Trustworthy-Software/MalLoc
  website: https://doi.org/10.1109/ICSME64153.2025.00076
tags:
  - android
