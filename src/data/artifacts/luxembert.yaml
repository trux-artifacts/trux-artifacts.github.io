name: LuxemBERT
type: library
area: Multilingual NLP & LLMs
description: >-
  A BERT model for Luxembourgish — a low-resource West Germanic language —
  trained with a simple, practical data-augmentation trick: partially translate
  closely-related German text into "pseudo-Luxembourgish" by swapping unambiguous
  function words, then mix it with real Luxembourgish. LuxemBERT outperforms
  multilingual mBERT and a Luxembourgish-only baseline across POS, NER and
  classification tasks, and ships with annotated datasets for the downstream
  tasks.
authors:
  - Cedric Lothritz
  - Bertrand Lebichot
  - Kevin Allix
  - Lisa Veiber
  - Tegawendé F. Bissyandé
  - Jacques Klein
  - Andrey Boytsov
  - Anne Goujon
  - Clément Lefebvre
status: stable
logo: llm
figure: luxembert.png
figureCaption: The data-augmentation scheme — German text is preprocessed and its function words translated into pseudo-Luxembourgish, then mixed with Luxembourgish text to pre-train LuxemBERT (paper, Figure 1)
paper:
  title: "LuxemBERT: Simple and Practical Data Augmentation in Language Model Pre-Training for Luxembourgish"
  venue: LREC
  year: 2022
  url: https://aclanthology.org/2022.lrec-1.543/
links:
  website: https://huggingface.co/lothritz/LuxemBERT
tags:
  - nlp
  - language-model
  - bert
  - luxembourgish
  - low-resource
dataset:
  stats:
    - value: 110000000
      label: Model parameters (BERT Base)
    - value: 6100000
      label: Luxembourgish sentences (pre-training)
    - value: 130000000
      label: Words in the Luxembourgish corpus
    - value: 12
      label: Transformer layers
    - value: 768
      label: Hidden size
    - value: 50
      suffix: "%"
      label: Luxembourgish share in the best corpus mix
    - value: 120
      label: Alphabet size (cut from 1000)
    - value: 529
      label: Function-word pairs for augmentation (De↔Lb)
    - value: 20
      suffix: "%"
      label: German text pseudo-translated to Luxembourgish
    - value: 4
      label: Downstream NLP tasks with released datasets
  sampleTitle: A taste of Luxembourgish
  sampleCount: 6
  sampleNote: >-
    Everyday sentences in Luxembourgish — the language LuxemBERT models —
    alongside their English or French source. Illustrative examples (not model
    outputs); hit shuffle for more.
  samples:
    - "EN · Luxembourg is a small country in the heart of Europe.  →  Lëtzebuerg ass e klengt Land am Häerz vun Europa."
    - "EN · Can you tell me the way to the train station, please?  →  Kënnt Dir mir de Wee op d'Gare soen, wann ech glift?"
    - "EN · I have been learning Luxembourgish for six months.  →  Ech léieren säit sechs Méint Lëtzebuergesch."
    - "EN · The weather is beautiful today, let's go for a walk.  →  D'Wieder ass haut schéin, loosst eis spadséieren."
    - "EN · Could you please speak a little more slowly?  →  Kënnt Dir w.e.g. e bësse méi lues schwätzen?"
    - "EN · I'd like to order two coffees and a piece of cake.  →  Ech géif gären zwee Kaffien an e Stéck Kuch bestellen."
    - "FR · Je m'appelle Anna et j'habite au Luxembourg depuis trois ans.  →  Mäin Numm ass Anna an ech wunnen zanter 3 Joer zu Lëtzebuerg."
    - "FR · Où se trouve l'arrêt de bus le plus proche ?  →  Wou ass déi nootste Busarrêt?"
    - "FR · Merci beaucoup pour votre aide, c'est très gentil.  →  Villmols Merci fir Är Hëllef, et ass ganz léif."
    - "FR · Nous allons dîner au restaurant ce soir.  →  Mir ginn den Owend am Restaurant iessen."
    - "FR · Quel temps fera-t-il demain à Luxembourg-Ville ?  →  Wéi gëtt d'Wieder muer an der Stad?"
    - "FR · J'aimerais réserver une table pour deux personnes.  →  Ech géif gären en Dësch fir zwee Leit reservéieren."
  usage:
    title: Load the model
    note: The uncased LuxemBERT model is on the Hugging Face Hub.
    code: |
      from transformers import AutoTokenizer, AutoModelForMaskedLM

      tok = AutoTokenizer.from_pretrained("lothritz/LuxemBERT")
      model = AutoModelForMaskedLM.from_pretrained("lothritz/LuxemBERT")
