name: LuxemBERT
type: library
area: Multilingual NLP & LLMs
description: >-
  A BERT model for Luxembourgish — a low-resource West Germanic language —
  trained with a simple, practical data-augmentation trick: partially translate
  closely-related German text into "pseudo-Luxembourgish" by swapping unambiguous
  function words, then mix it with real Luxembourgish. LuxemBERT outperforms
  a Luxembourgish-only baseline and multilingual mBERT on most evaluated task
  variants; the paper reports five of six wins over mBERT, with the cased model
  winning all six. The study also creates four annotated downstream datasets,
  available from the authors on request.
cardDescription: A Luxembourgish BERT model trained with augmented German and Luxembourgish text.
authors:
  - Cedric Lothritz
  - Bertrand Lebichot
  - Kevin Allix
  - Lisa Veiber
  - Tegawendé F. Bissyandé
  - Jacques Klein
  - Andrey Boytsov
  - Clément Lefebvre
  - Anne Goujon
addedAt: '2026-07-11'
logo: llm
figure: luxembert.png
figureCaption: The data-augmentation scheme — German text is preprocessed and its function words translated into pseudo-Luxembourgish, then mixed with Luxembourgish text to pre-train LuxemBERT (paper, Figure 1)
paper:
  title: "LuxemBERT: Simple and Practical Data Augmentation in Language Model Pre-Training for Luxembourgish"
  venue: LREC
  year: 2022
  url: https://aclanthology.org/2022.lrec-1.543/
links:
  website: https://huggingface.co/lothritz/LuxemBERT
tags:
  - nlp
  - language-model
  - bert
  - luxembourgish
  - low-resource
dataset:
  stats:
    - value: 110000000
      label: Model parameters (BERT Base)
    - value: 6100000
      label: Luxembourgish sentences (pre-training)
    - value: 130000000
      label: Words in the Luxembourgish corpus
    - value: 12
      label: Transformer layers
    - value: 768
      label: Hidden size
    - value: 50
      suffix: "%"
      label: Luxembourgish share in the best corpus mix
    - value: 120
      label: Alphabet size (cut from 1000)
    - value: 529
      label: Function-word pairs for augmentation (De↔Lb)
    - value: 20
      suffix: "%"
      label: German text pseudo-translated to Luxembourgish
    - value: 4
      label: Downstream datasets created (available on request)
  usage:
    title: Load the model
    note: The uncased LuxemBERT model is on the Hugging Face Hub.
    code: |
      from transformers import AutoTokenizer, AutoModelForMaskedLM

      tok = AutoTokenizer.from_pretrained("lothritz/LuxemBERT")
      model = AutoModelForMaskedLM.from_pretrained("lothritz/LuxemBERT")
demo:
  style: llm
  engineLabel: LuxemBERT
  inputLabel: Fill-mask prompt
  intro: >-
    Try three Luxembourgish masked-language prompts and preview the top tokens a
    LuxemBERT fill-mask pipeline could return.
  outputLabel: Top predictions
  countOutput: false
  note: >-
    Interactive simulation — prompts, token rankings, and probabilities are
    illustrative mock outputs chosen to demonstrate masked-language modeling.
    No model inference runs in the browser and these values are not paper
    measurements.
  scenarios:
    - label: Describe Luxembourg
      query: Lëtzebuerg ass e [MASK] Land.
      thinking:
        - Loading the LuxemBERT tokenizer…
        - Locating the masked token in the Luxembourgish sentence…
        - Ranking vocabulary candidates by simulated probability…
      output:
        - "1  klengt   0.431  · Lëtzebuerg ass e klengt Land."
        - "2  schéint  0.182  · Lëtzebuerg ass e schéint Land."
        - "3  grousst  0.094  · Lëtzebuerg ass e grousst Land."
      explanation: >-
        The preview mimics a standard Hugging Face fill-mask response while
        keeping all displayed probabilities explicitly simulated.
    - label: Complete the weather
      query: D'Wieder ass haut [MASK].
      thinking:
        - Tokenizing a short everyday Luxembourgish sentence…
        - Scoring adjectives that fit the masked position…
        - Decoding the three highest mock candidates…
      output:
        - "1  gutt    0.372  · D'Wieder ass haut gutt."
        - "2  schéin  0.226  · D'Wieder ass haut schéin."
        - "3  kal     0.108  · D'Wieder ass haut kal."
      explanation: >-
        Multiple completions remain linguistically possible; these rankings are
        a plausible illustration rather than an actual inference trace.
    - label: Complete a destination
      query: Ech fuere muer mam Zuch op [MASK].
      thinking:
        - Encoding the travel context around the mask…
        - Ranking place-like continuations from the model vocabulary…
        - Formatting the simulated top-k response…
      output:
        - "1  Lëtzebuerg  0.294  · Ech fuere muer mam Zuch op Lëtzebuerg."
        - "2  Paräis      0.171  · Ech fuere muer mam Zuch op Paräis."
        - "3  Bréissel    0.113  · Ech fuere muer mam Zuch op Bréissel."
      explanation: >-
        This third mock shows how the same library can expose ranked candidates
        for a context that admits several valid destinations.
