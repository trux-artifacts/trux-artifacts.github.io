name: AndroLog
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Instruments Android apps in a black-box manner (on top of Soot) to compute
  fine-grained code coverage at class, method, statement, and component
  levels — instrumenting up to 98% of recent apps where prior tools stall.
authors:
  - Jordan Samhi
  - Andreas Zeller
status: maintained
logo: android
figure: androlog.png
figureCaption: AndroLog's architecture, the Instrumenter instruments an app and the Log Processor generates a code coverage report (FSE 2024 paper, Figure 1)
paper:
  title: "AndroLog: Android Instrumentation and Code Coverage Analysis"
  venue: FSE
  year: 2024
  doi: 10.1145/3663529.3663806
links:
  github: https://github.com/JordanSamhi/AndroLog
  video: https://www.youtube.com/watch?v=NEcYg98k_o4
tags:
  - android
  - instrumentation
  - code-coverage
  - dynamic-analysis
demo:
  style: terminal
  intro: >-
    Follow AndroLog's documented two-step workflow: instrument an APK, exercise
    the instrumented app, then process its runtime logs into coverage data.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    These are commands from the official repository documentation. They are not
    executed by this website and no application-specific coverage result is
    simulated.
  scenarios:
    - label: Instrument an APK
      query: java -jar AndroLog/target/androlog-0.1-jar-with-dependencies.jar -p ./Androidplatforms/ -l MY_SUPER_LOG -o ./output/ -a my_app.apk -c -m -cp
      thinking:
        - Select the Android platform directory, log tag, output directory and APK.
        - Enable class, method and component instrumentation with the documented flags.
      output:
        - "Official repository command — not executed by this website."
        - "The instrumented APK is written under the selected output directory."
      explanation: >-
        Install and exercise the generated APK so that its probes emit runtime
        logs tagged with MY_SUPER_LOG.
    - label: Process collected logs
      query: java -jar AndroLog/target/androlog-0.1-jar-with-dependencies.jar -p ./Androidplatforms/ -l MY_SUPER_LOG -a my_app.apk -c -m -cp -pa logs
      thinking:
        - Reuse the same instrumentation configuration.
        - Point AndroLog at the directory containing the collected runtime logs.
      output:
        - "Official repository workflow — not executed by this website."
        - "Coverage depends on the APK and on the interactions captured in logs."
      explanation: >-
        The -pa option processes the collected logs. AndroLog can then derive
        coverage at the enabled granularities without this catalog inventing
        application names, probe rates or percentages.
