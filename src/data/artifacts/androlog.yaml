name: AndroLog
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Instruments Android apps in a black-box manner (on top of Soot) to compute
  fine-grained code coverage at class, method, statement, and component
  levels — instrumenting up to 98% of recent apps where prior tools stall.
authors:
  - Jordan Samhi
  - Andreas Zeller
status: maintained
logo: android
figure: androlog.png
figureCaption: AndroLog's architecture, the Instrumenter instruments an app and the Log Processor generates a code coverage report (FSE 2024 paper, Figure 1)
paper:
  title: "AndroLog: Android Instrumentation and Code Coverage Analysis"
  venue: FSE
  year: 2024
  doi: 10.1145/3663529.3663806
links:
  github: https://github.com/JordanSamhi/AndroLog
  video: https://www.youtube.com/watch?v=NEcYg98k_o4
tags:
  - android
  - instrumentation
  - code-coverage
  - dynamic-analysis
demo:
  style: terminal
  intro: >-
    Select an instrumentation profile. AndroLog rewrites the APK, collects the
    runtime probe log after the app is exercised, then reports coverage at
    class, method, statement and component granularity.
  outputLabel: AndroLog output
  countOutput: false
  note: >-
    Simulated preview using representative fictional APKs, probe counts and
    coverage results; nothing runs in the browser. The two-step workflow and
    command-line flags follow the official repository, but every application
    name and number shown below is illustrative and is not reported by the
    paper.
  scenarios:
    - label: Full four-level coverage
      query: java -jar AndroLog/target/androlog-0.1-jar-with-dependencies.jar -p platforms/ -l ANDROLOG_DEMO -o out/ -a lab.notes.apk -c -m -s -cp
      thinking:
        - Transforming Dalvik bytecode into the analysis representation…
        - Inserting class, method, statement and component probes…
        - Rebuilding and signing the instrumented APK…
        - Processing the captured ANDROLOG_DEMO runtime events…
      output:
        - "[✓] Instrumented APK: out/lab.notes-instrumented.apk"
        - "[✓] Runtime events processed: 4,826"
        - "Coverage report"
        - "  classes       118 / 164    72.0%"
        - "  methods       493 / 918    53.7%"
        - "  statements  3,742 / 8,604  43.5%"
        - "  components       8 / 10     80.0%"
      explanation: >-
        The fictional report previews the complete workflow: instrumentation,
        execution, log processing, then four complementary coverage views.
    - label: Component-focused smoke test
      query: java -jar AndroLog/target/androlog-0.1-jar-with-dependencies.jar -p platforms/ -l SMOKE_TEST -o out/ -a lab.weather.apk -c -m -cp
      thinking:
        - Discovering activities, services and broadcast receivers…
        - Instrumenting component callbacks and their enclosing methods…
        - Replaying a short navigation-and-background-service test trace…
        - Aggregating probe hits by Android component…
      output:
        - "[✓] Instrumented components: 12"
        - "[✓] Observed components: 9"
        - "  MainActivity                 covered"
        - "  ForecastService             covered"
        - "  LocationReceiver            covered"
        - "  SettingsActivity            not covered"
        - "Component coverage: 9 / 12 · 75.0%"
      explanation: >-
        This simulated smoke test emphasizes Android components, making it easy
        to spot a screen or background entry point that the interaction trace
        never reached.
    - label: Process an existing log directory
      query: java -jar AndroLog/target/androlog-0.1-jar-with-dependencies.jar -p platforms/ -l REGRESSION -a lab.reader.apk -c -m -s -cp -pa logs/regression-run/
      thinking:
        - Loading previously collected logcat events…
        - Matching probe identifiers to the original APK statements…
        - Discarding duplicate events from repeated UI actions…
        - Computing a stable regression coverage summary…
      output:
        - "[✓] Parsed 11,204 events from logs/regression-run/"
        - "[✓] Unique probes hit: 6,381"
        - "Coverage delta versus baseline"
        - "  methods       +27 newly covered"
        - "  statements   +214 newly covered"
        - "  components    unchanged (7 / 9)"
      explanation: >-
        The -pa workflow is useful when instrumentation and log processing are
        separated. Here the fictional output shows the kind of regression delta
        an analyst could derive from a stored trace.
