name: AndroLog
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Instruments Android apps in a black-box manner (on top of Soot) to compute
  fine-grained code coverage at class, method, statement, and component
  levels — instrumenting up to 98% of recent apps where prior tools stall.
authors:
  - Jordan Samhi
  - Andreas Zeller
status: maintained
logo: android
figure: androlog.png
figureCaption: AndroLog's architecture, the Instrumenter instruments an app and the Log Processor generates a code coverage report (FSE 2024 paper, Figure 1)
