name: TriggerZoo
type: dataset
area: Android Datasets
description: >-
  A labeled dataset of 406 Google Play apps instrumented with one
  trigger-based behavior using AndroBomb: 240 contain logic bombs and 166
  contain benign trigger-based behavior, providing ground truth for evaluating
  logic bomb detectors.
cardDescription: A labeled Android dataset for evaluating trigger-based logic bomb detectors.
authors:
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-07'
logo: android
figure: triggerzoo.png
figureCaption: Overview of the infection process used to build TriggerZoo (MSR 2022 paper, Figure 1)
paper:
  title: "TriggerZoo: A Dataset of Android Applications Automatically Infected with Logic Bombs"
  venue: MSR
  year: 2022
  doi: 10.1145/3524842.3528020
links:
  github: https://github.com/JordanSamhi/TriggerZoo
  access: https://androzoo.uni.lu/access
  resources:
    - label: Archived dataset (Zenodo)
      url: https://doi.org/10.5281/zenodo.5907916
tags:
  - android
  - logic-bombs
  - malware
dataset:
  stats:
    - value: 406
      label: apps with labeled trigger-based behavior
    - value: 240
      label: apps containing logic bombs
    - value: 166
      label: apps containing benign trigger-based behavior
    - value: 2000
      label: apps processed
    - value: 10
      label: trigger types
    - value: 14
      label: guarded-code types
  sampleTitle: Labeled entries
  sampleSource: triggerzoo_labeled_dataset
  sampleHeader: "sha256_original_app;class_infected;component;method_infected;trigger_type;guarded_code_type;depths"
  sampleCount: 4
  sampleNote: >-
    Real labeled rows from the dataset (each app infected with one trigger-based
    behavior). Access the full dataset through AndroZoo — see the buttons above.
  samples:
    - "01B14EC0…;com.gmail.coolapps726.bankTester.utilities.BankDisplay;Activity;<…: String a(String)>;location;native_log_string;2"
    - "0183941E…;lp2i.radiodelta.fr.MainActivity;Activity;<…: void facebook(View)>;is_screen_off;set_text;0"
    - "01C568B2…;navi.android.my_launcher.ParticleImageSelection;Activity;<…: void onActivityResult(int,int,Intent)>;is_screen_off;stop_wifi;0"
    - "01DD0234…;com.osmanli.kilotakip.Sayfa1Activity;Activity;<…: void Ekle()>;network;write_string;1"
    - "04B9D9DE…;com.prueba.joel.sort.MainActivity;Activity;<…: void onBackPressed()>;location;return;0"
    - "06239084…;com.bcs.marvlis.fle.psapmonitor.MainActivity;Activity;<…: void onCreateContextMenu(…)>;build;set_text;0"
    - "0298F2C4…;com.speedymarks.android.averageFree.Main;Activity;<…: void createAdView()>;music;native_write_phone_number;1|1"
    - "06328181…;com.sportconsulting.ayuntamientoalcantarilla.MainActivity;Activity;<…: void onCreate(Bundle)>;is_screen_off;sms_string;0"
  usage:
    title: Resolve a labeled sample through AndroZoo
    note: >-
      TriggerZoo publishes SHA256 identifiers rather than redistributing the
      APKs. Researchers with an AndroZoo API key can resolve an authorized
      sample by its full hash from the released label file.
    code: |
      curl -O --remote-header-name -G \
        -d apikey=${APIKEY} \
        -d sha256=${SHA256_FROM_TRIGGERZOO} \
        https://androzoo.uni.lu/api/download
