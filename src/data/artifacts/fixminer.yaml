name: FixMiner
type: tool
area: Patches & Program Repair
description: >-
  Mines relevant fix patterns from code changes in software repositories,
  producing pattern collections that fuel automated program repair systems.
authors:
  - Anil Koyuncu
  - Kui Liu
  - Tegawendé F. Bissyandé
  - Dongsun Kim
  - Jacques Klein
  - Martin Monperrus
  - Yves Le Traon
status: stable
logo: repair
figure: fixminer.png
figureCaption: The FixMiner approach (EMSE 2020 paper, Figure 5)
paper:
  title: "FixMiner: Mining Relevant Fix Patterns for Automated Program Repair"
  venue: EMSE
  year: 2020
  doi: 10.1007/s10664-019-09780-z
links:
  github: https://github.com/TruX-DTF/fixminer_source
tags:
  - program-repair
  - fix-patterns
  - mining
demo:
  style: terminal
  intro: >-
    Preview the documented FixMiner build and the first Java mining job. The
    complete pipeline then runs its remaining jobs in the order listed by the
    official repository.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    Documentation preview only — these commands come from the official
    repository and are not executed in the browser. No fabricated cluster
    counts or pattern rankings are shown.
  scenarios:
    - label: Build FixMiner
      query: mvn clean install
      thinking:
        - Showing the official build step; no command is executed.
      output:
        - "Build the FixPatternMiner JAR and project dependencies."
        - "Before running, configure the paths in src/main/resources/config.yml."
      explanation: >-
        The repository requires JDK 8, its Conda environment, Redis, and a
        configured YAML file before the mining pipeline can run.
    - label: Create the Java mining dataset
      query: bash fixminer.sh /path/to/config.yml dataset4j
      thinking:
        - Showing the first documented pipeline job; no command is executed.
      output:
        - "Job: dataset4j — create a Java mining dataset from subjects.csv."
        - "Next documented jobs: richedit, actionSI, compare, cluster, tokenSI, compare, stats, patterns."
      explanation: >-
        FixMiner's jobs are intentionally sequential: later comparison,
        clustering, statistics, and pattern export steps consume the earlier
        intermediate data.
