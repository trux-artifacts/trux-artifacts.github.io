name: FixMiner
type: tool
area: Patches & Program Repair
description: >-
  Mines relevant fix patterns from code changes in software repositories,
  producing pattern collections that fuel automated program repair systems.
authors:
  - Anil Koyuncu
  - Kui Liu
  - Tegawendé F. Bissyandé
  - Dongsun Kim
  - Jacques Klein
  - Martin Monperrus
  - Yves Le Traon
status: stable
logo: repair
figure: fixminer.png
figureCaption: The FixMiner approach (EMSE 2020 paper, Figure 5)
paper:
  title: "FixMiner: Mining Relevant Fix Patterns for Automated Program Repair"
  venue: EMSE
  year: 2020
  doi: 10.1007/s10664-019-09780-z
links:
  github: https://github.com/TruX-DTF/fixminer_source
tags:
  - program-repair
  - fix-patterns
  - mining
demo:
  style: patch
  intro: >-
    Explore mock fix-pattern clusters as if FixMiner had just mined a corpus of
    bug-fixing commits. Each view combines an abstract edit script, a recurring
    patch shape, and simulated support across projects.
  note: >-
    Interactive simulation only — no repository is mined in the browser.
    Pattern instances, identifiers, rankings, project counts, and support
    values are fictional demonstrations of FixMiner's output format; they are
    not empirical results from the paper.
  scenarios:
    - label: Insert null guard
      file: "Mock cluster #17 · Null-pointer guard"
      pattern: 486 simulated changes · 73 simulated projects
      thinking:
        - Scanning synthetic bug-fixing commits…
        - Computing AST differences with GumTree…
        - Building rich edit scripts from shape, actions, and tokens…
        - Clustering equivalent scripts and abstracting identifiers…
      output:
        - "  actions: INS_IF · INS_INFIX_EXPR(!=) · MOVE_STMT"
        - ""
        - "-    $receiver.$method($args);"
        - "+    if ($receiver != null) {"
        - "+        $receiver.$method($args);"
        - "+    }"
      explanation: >-
        This mock cluster abstracts many imagined fixes into a reusable guard
        template. Placeholders preserve what varies while the edit actions keep
        the common repair structure.
    - label: Protect an array access
      file: "Mock cluster #23 · Bounds check"
      pattern: 358 simulated changes · 62 simulated projects
      thinking:
        - Extracting synthetic Java patches…
        - Aligning before/after AST nodes…
        - Detecting a repeated conditional insertion…
        - Generalizing array, index, and value tokens…
      output:
        - "  actions: INS_IF · INS_INFIX_EXPR(<) · MOVE_STMT"
        - ""
        - "-    $array[$index] = $value;"
        - "+    if ($index >= 0 && $index < $array.length) {"
        - "+        $array[$index] = $value;"
        - "+    }"
      explanation: >-
        The simulated miner groups structurally similar bounds fixes and emits
        an abstract pattern that an automated repair system could instantiate.
    - label: Close a resource safely
      file: "Mock cluster #41 · Try-with-resources"
      pattern: 312 simulated changes · 58 simulated projects
      thinking:
        - Mining a synthetic stream-handling patch corpus…
        - Comparing control-flow and resource-lifetime edits…
        - Clustering equivalent try-with-resources transformations…
        - Producing a parameterized repair pattern…
      output:
        - "  actions: INS_TRY_RESOURCE · MOVE_STMT · DEL_CLOSE_CALL"
        - ""
        - "-    $Stream in = new $Stream($path);"
        - "-    $body;"
        - "-    in.close();"
        - "+    try ($Stream in = new $Stream($path)) {"
        - "+        $body;"
        - "+    }"
      explanation: >-
        This fictional cluster demonstrates a larger structural pattern: move
        the resource into a managed scope and remove the explicit close call.
