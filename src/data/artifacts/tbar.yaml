name: TBar
type: tool
area: Patches & Program Repair
description: >-
  A template-based automated program repair tool that revisits and unifies
  fix patterns from the literature, a widely used baseline in APR research.
cardDescription: Repairs Java programs with reusable fix patterns mined from prior research.
authors:
  - Kui Liu
  - Anil Koyuncu
  - Dongsun Kim
  - Tegawendé F. Bissyandé
addedAt: '2026-07-06'
logo: repair
figure: tbar.png
figureCaption: The overall workflow of TBar (ISSTA 2019 paper, Figure 1)
paper:
  title: "TBar: Revisiting Template-Based Automated Program Repair"
  venue: ISSTA
  year: 2019
  doi: 10.1145/3293882.3330577
links:
  github: https://github.com/TruX-DTF/TBar
tags:
  - program-repair
  - java
  - fix-patterns
demo:
  style: patch
  intro: >-
    Pick a fictional Java bug to preview TBar's repair loop: localize a
    suspicious statement, match its AST context against a fix template,
    instantiate candidates, and validate them against a test suite.
  note: >-
    Interactive simulation only — TBar and the tests do not run in the browser.
    Files, defects, suspiciousness scores, generated patches, candidate ranks,
    and test outcomes are fictional; only the fix-template concepts reflect the
    tool's workflow, and none of these examples is a paper result.
  scenarios:
    - label: Insert a null check
      file: src/chart/PlotRenderer.java
      pattern: Insert Null Pointer Checker
      thinking:
        - "Mock failing test: PlotRendererTest.emptyAnnotations"
        - Localizing the suspicious dereference…
        - Matching the AST context against TBar templates…
        - Instantiating a null-pointer checker and running tests…
      output:
        - "@@ -214,6 +214,9 @@ Range dataRange(Axis axis) {"
        - "     Collection<Annotation> notes = getAnnotations();"
        - "+    if (notes == null) {"
        - "+        return Range.empty();"
        - "+    }"
        - "     for (Annotation note : notes) {"
      explanation: >-
        The mock candidate wraps the suspicious dereference with a guard. It is
        shown as candidate 3/14 with 487/487 simulated tests passing.
    - label: Mutate a boundary
      file: src/math/BracketSolver.java
      pattern: Mutate Conditional Expression
      thinking:
        - "Mock failing test: BracketSolverTest.rootAtEndpoint"
        - Ranking the interval check as the top suspicious statement…
        - Enumerating comparison-operator mutations…
        - Validating each candidate against boundary and regression tests…
      output:
        - "@@ -128,7 +128,7 @@ double solve(Function f, double min, double max) {"
        - "     double fa = f.value(min);"
        - "     double fb = f.value(max);"
        - "-    if (fa * fb >= 0) {"
        - "+    if (fa * fb > 0) {"
        - "         throw new NoBracketingException();"
      explanation: >-
        This fictional repair weakens the comparison so an endpoint that is
        exactly a root is accepted. The demo reports 1 failing and 824 passing
        tests before repair, then 825/825 after the mock mutation.
    - label: Guard an index
      file: src/collections/TokenWindow.java
      pattern: Insert Range Checker
      thinking:
        - "Mock failing test: TokenWindowTest.ignoresOutOfRangeLookahead"
        - Localizing the indexed list access…
        - Trying range-check insertion templates…
        - Compiling candidates and executing the simulated suite…
      output:
        - "@@ -91,6 +91,9 @@ String tokenAt(List<String> tokens, int index) {"
        - "+    if (index < 0 || index >= tokens.size()) {"
        - "+        return null;"
        - "+    }"
        - "     return tokens.get(index);"
      explanation: >-
        The fictional repair uses TBar's supported Insert Range Checker pattern
        to guard the suspicious access. The mock suite reports 146/146 tests
        passing after rejecting two candidates that changed valid lookups.
