name: TBar
type: tool
area: Patches & Program Repair
description: >-
  A template-based automated program repair tool that revisits and unifies
  fix patterns from the literature, a widely used baseline in APR research.
authors:
  - Kui Liu
  - Anil Koyuncu
  - Dongsun Kim
  - Tegawendé F. Bissyandé
status: stable
logo: repair
figure: tbar.png
figureCaption: The overall workflow of TBar (ISSTA 2019 paper, Figure 1)
paper:
  title: "TBar: Revisiting Template-Based Automated Program Repair"
  venue: ISSTA
  year: 2019
  doi: 10.1145/3293882.3330577
links:
  github: https://github.com/TruX-DTF/TBar
tags:
  - program-repair
  - java
  - fix-patterns
demo:
  style: terminal
  intro: >-
    Preview TBar's documented runner for the Chart_8 bug from Defects4J using
    normal spectrum-based fault localization.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    Documentation preview only — this exact runner invocation comes from the
    official repository and is not executed in the browser. No unsourced patch,
    suspiciousness score, or test outcome is simulated.
  scenarios:
    - label: Normal fault localization
      query: ./NormalFLTBarRunner.sh D4J/projects/ Chart_8 D4J/defects4j/
      thinking:
        - Showing the official runner example; no repair is run.
      output:
        - "Target bug: Chart_8"
        - "Fault localization: normal GZoltar-based configuration"
        - "Use absolute paths if the configured Defects4J or bug-data paths are not resolved."
      explanation: >-
        TBar also provides PerfectFLTBarRunner.sh for experiments with perfect
        fault localization. Generated patches and evaluation results are
        distributed in the repository rather than fabricated here.
