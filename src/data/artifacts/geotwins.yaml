name: GeoTwins
type: tool
area: Android Static & Dynamic Analysis
description: >-
  A distributed app-collection and analysis pipeline that crawls Google Play
  from seven countries and compares regional app variants (permissions,
  libraries, code, privacy disclosures) to uncover geographic disparities.
authors:
  - Marco Alecci
  - Pedro Jesús Ruiz Jiménez
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: geotwins.png
figureCaption: Overview of the data collection and processing pipeline used to construct the Global Dataset and the GeoTwins Dataset (MobiSys 2026 paper, Figure 2)
paper:
  title: "GeoTwins: Uncovering Hidden Geographic Disparities in Android Apps"
  venue: MobiSys
  year: 2026
  doi: 10.1145/3745756.3809191
links:
  github: https://github.com/Trustworthy-Software/GeoTwins
tags:
  - android
  - geographic-disparities
  - empirical-study
demo:
  style: terminal
  intro: >-
    Set up the environment exactly as documented by the GeoTwins repository,
    then configure the AndroZoo API key and third-party-library path before
    running the research-question notebooks in 1_Code/.
  outputLabel: Documented next steps
  countOutput: false
  note: >-
    Documentation preview only — the command is copied from the official
    README and is not executed in the browser. Reproducing the analysis also
    requires AndroZoo access and the data described by the authors.
  scenarios:
    - label: Prepare the notebook environment
      query: |-
        conda create --name demoEnv python=3.8
        conda activate demoEnv
        pip install -r requirements.txt
      thinking:
        - Showing the repository's documented environment setup; no command is executed.
      output:
        - "Set ANDROZOO_API_KEY in .env."
        - "Set THIRD_PARTY_LIBS_PATH in .env."
        - "Run the notebooks under 1_Code/ in research-question order."
      explanation: >-
        The repository distributes the analysis primarily as Jupyter notebooks;
        AppUtils.py extracts APK features and PairwiseAnalysisUtils.py compares
        regional variants.
