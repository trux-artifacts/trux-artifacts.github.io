name: GeoTwins
type: tool
area: Android Static & Dynamic Analysis
description: >-
  A distributed app-collection and analysis pipeline that crawls Google Play
  from seven countries and compares regional app variants (permissions,
  libraries, code, privacy disclosures) to uncover geographic disparities.
authors:
  - Marco Alecci
  - Pedro Jesús Ruiz Jiménez
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: geotwins.png
figureCaption: Overview of the data collection and processing pipeline used to construct the Global Dataset and the GeoTwins Dataset (MobiSys 2026 paper, Figure 2)
paper:
  title: "GeoTwins: Uncovering Hidden Geographic Disparities in Android Apps"
  venue: MobiSys
  year: 2026
  doi: 10.1145/3745756.3809191
links:
  github: https://github.com/Trustworthy-Software/GeoTwins
tags:
  - android
  - geographic-disparities
  - empirical-study
demo:
  style: terminal
  intro: >-
    Select two real package-name pairs from the released GeoTwins dataset and
    preview how the pipeline compares code, permissions, libraries, and privacy
    disclosures across regional variants.
  outputLabel: Pairwise analysis
  countOutput: false
  note: >-
    Interactive simulation — package-name pairs are real rows from
    4_geoTwins.csv, while the per-pair feature counts and similarity values are
    plausible mock results. No APK is downloaded or analyzed in the browser.
  scenarios:
    - label: Home Portal · TW ↔ US
      query: python compare_pair.py com.climax.homeportal.tw com.climax.homeportal.us
      thinking:
        - Resolving both APKs from the configured AndroZoo index…
        - Extracting permissions, third-party libraries, and code features…
        - Computing the pairwise regional-difference report…
      output:
        - "pair: com.climax.homeportal.tw ↔ com.climax.homeportal.us"
        - "branding match ........ yes"
        - "code similarity ....... 96.8%"
        - "permissions ........... 18 shared · 1 TW-only · 2 US-only"
        - "third-party libraries . 11 shared · 1 regional"
        - "verdict ............... likely geographic variants"
      explanation: >-
        A representative mock report for one real same-branding pair, shaped
        around the feature families analyzed by GeoTwins.
    - label: American Express · FR ↔ UK
      query: python compare_pair.py com.americanexpress.android.acctsvcs.fr com.americanexpress.android.acctsvcs.uk
      thinking:
        - Matching both packages to their GeoFamily…
        - Comparing manifests and normalized application code…
        - Summarizing regional-only features…
      output:
        - "pair: com.americanexpress.android.acctsvcs.fr ↔ com.americanexpress.android.acctsvcs.uk"
        - "branding match ........ yes"
        - "code similarity ....... 98.1%"
        - "permissions ........... 27 shared · 2 FR-only · 1 UK-only"
        - "third-party libraries . 16 shared · 2 regional"
        - "privacy text distance . 0.18"
      explanation: >-
        This simulated run demonstrates how a very high code overlap can still
        coexist with smaller manifest, library, or disclosure differences.
    - label: Radio FM · Japan ↔ Chile
      query: python compare_pair.py com.radiosonline.radiofmjapan com.radiosonline.radiofmchile
      thinking:
        - Loading a second real pair from the dataset…
        - Normalizing package-specific identifiers before code comparison…
        - Ranking the largest feature deltas…
      output:
        - "pair: com.radiosonline.radiofmjapan ↔ com.radiosonline.radiofmchile"
        - "branding match ........ yes"
        - "code similarity ....... 94.3%"
        - "permissions ........... 16 shared · 2 JP-only · 2 CL-only"
        - "third-party libraries . 8 shared · 2 regional"
        - "verdict ............... likely geographic variants"
      explanation: >-
        The mock output illustrates the comparison workflow without claiming
        that these particular per-app measurements were published in the paper.
