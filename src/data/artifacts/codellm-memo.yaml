name: CodeLLM-Memo
type: benchmark
area: LLMs for Software Engineering
logo: llm
description: >-
  A framework quantifying the memorization advantage of code LLMs via the
  Perturbation Sensitivity Hypothesis — measuring how model performance
  degrades under small, meaning-preserving prompt perturbations.
authors:
  - Djiré Albérick Euraste
  - Abdoul Kader Kaboré
  - Jordan Samhi
  - Earl Barr
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
figure: codellm-memo.png
figureCaption: Memorization advantage example, impact of prompt perturbation on the outputs of StarCoder and CodeLlama (paper, Figure 2)
paper:
  title: "Learned or Memorized? Quantifying Memorization Advantage in Code LLMs"
  venue: arXiv
  year: 2026
  url: https://arxiv.org/abs/2604.13997
links:
  github: https://github.com/Berickal/CodeLLM_Memo
tags:
  - llm
  - memorization
  - code-generation
  - benchmarks
demo:
  style: patch
  intro: >-
    CodeLLM-Memo tests the Perturbation Sensitivity Hypothesis: if a code LLM
    truly learned a task, a small meaning-preserving change to the input
    shouldn't hurt it; if it merely memorized the benchmark, its score collapses.
    Each example applies such a perturbation, then compares the model's score
    before and after. A large drop reveals a memorization advantage.
  note: >-
    Illustrative runs with representative scores — nothing runs in your browser
    and no model is called. The real framework (pipeline.py) perturbs benchmark
    inputs, generates answers with Ollama-hosted models (CodeLlama, StarCoder, …)
    over several iterations, and scores them with Levenshtein / Cosine / NCD /
    ROUGE.
  scenarios:
    - label: CodeLlama · code generation
      file: Code Generation · CodeLlama · ROUGE
      pattern: meaning-preserving perturbation
      thinking:
        - Loading benchmark item…
        - Applying meaning-preserving perturbation…
        - Generating answers with CodeLlama (×5 iterations)…
        - Scoring original vs perturbed (ROUGE)…
      output:
        - "# NL prompt — same task, reworded"
        - "- Write a Python function to check whether a number is prime."
        - "+ Write a Python function that determines if an integer is a prime number."
      verdictAnswer: MEMORIZED
      verdictLabel: "ROUGE 0.96 → 0.37  (Δ 0.59)"
      verdictKind: memorized
      explanation: >-
        The original prompt likely appeared verbatim in training data: CodeLlama
        reproduces the reference solution (ROUGE 0.96). A trivial reword that
        keeps the exact same task collapses the score to 0.37. This sensitivity
        to meaning-preserving changes is the signature of memorization, not
        understanding — the advantage the framework quantifies.
    - label: CodeLlama · program repair
      file: Program Repair · CodeLlama · NCD
      pattern: variables renamed (obfuscation)
      thinking:
        - Loading benchmark item…
        - Renaming identifiers (meaning-preserving)…
        - Generating answers with CodeLlama (×5 iterations)…
        - Scoring original vs perturbed (NCD)…
      output:
        - "# buggy input — same off-by-one bug, identifiers renamed"
        - "- for (int i = 0; i <= n; i++)"
        - "+ for (int idx = 0; idx <= count; idx++)"
      verdictAnswer: MEMORIZED
      verdictLabel: "NCD sim 0.93 → 0.34  (Δ 0.59)"
      verdictKind: memorized
      explanation: >-
        Renaming the loop variables preserves the bug and its required fix
        exactly. Yet the repair quality (normalized compression distance to the
        reference patch) drops from 0.93 to 0.34 — CodeLlama had memorized the
        specific benchmark instance rather than learning to repair the pattern.
    - label: StarCoder · code generation
      file: Code Generation · StarCoder · ROUGE
      pattern: meaning-preserving perturbation
      thinking:
        - Loading benchmark item…
        - Applying meaning-preserving perturbation…
        - Generating answers with StarCoder (×5 iterations)…
        - Scoring original vs perturbed (ROUGE)…
      output:
        - "# NL prompt — same task, reworded"
        - "- Implement bubble sort in Java."
        - "+ Implement the bubble-sort algorithm in Java."
      verdictAnswer: LEARNED
      verdictLabel: "ROUGE 0.86 → 0.82  (Δ 0.04)"
      verdictKind: learned
      explanation: >-
        Here the same kind of perturbation barely moves the score (0.86 → 0.82).
        StarCoder produces an equally good sort regardless of the wording —
        evidence of genuine capability on this item, with little to no
        memorization advantage. Not every model/benchmark pair is memorized; the
        framework tells them apart.
    - label: CodeLlama · summarization
      file: Code Summarization · CodeLlama · ROUGE
      pattern: variables renamed (obfuscation)
      thinking:
        - Loading benchmark item…
        - Renaming identifiers (meaning-preserving)…
        - Generating answers with CodeLlama (×5 iterations)…
        - Scoring original vs perturbed (ROUGE)…
      output:
        - "# code input — same trivial function, identifiers renamed"
        - "- public int add(int a, int b) { return a + b; }"
        - "+ public int sum(int x, int y) { return x + y; }"
      verdictAnswer: MEMORIZED
      verdictLabel: "ROUGE 0.90 → 0.45  (Δ 0.45)"
      verdictKind: memorized
      explanation: >-
        A pure rename of a trivial function should not change its summary. But
        CodeLlama's summary quality nearly halves (0.90 → 0.45), revealing that
        its high score on the original came from having seen that exact snippet —
        a memorization advantage rather than summarization skill.
