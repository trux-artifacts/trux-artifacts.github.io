name: CodeLLM-Memo
type: benchmark
area: LLMs for Software Engineering
logo: llm
description: >-
  A framework quantifying the memorization advantage of code LLMs via the
  Perturbation Sensitivity Hypothesis — measuring how model performance
  degrades under small, meaning-preserving prompt perturbations.
authors:
  - Djiré Albérick Euraste
  - Abdoul Kader Kaboré
  - Jordan Samhi
  - Earl Barr
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
figure: codellm-memo.png
figureCaption: Memorization advantage example, impact of prompt perturbation on the outputs of StarCoder and CodeLlama (paper, Figure 2)
paper:
  title: "Quantifying Memorization Advantage in Code LLMs"
  venue: ICSE
  year: 2026
  url: https://conf.researchr.org/details/icse-2026/icse-2026-research-track/37/Quantifying-Memorization-Advantage-in-Code-LLMs
links:
  github: https://github.com/Berickal/CodeLLM_Memo
tags:
  - llm
  - memorization
  - code-generation
  - benchmarks
demo:
  style: patch
  intro: >-
    Choose a benchmark task to preview how CodeLLM-Memo can compare a model's
    response before and after a small, meaning-preserving perturbation. The mock
    pipeline highlights both fragile and stable behavior at a glance.
  note: >-
    Interactive simulation only — no model is called in the browser. Prompts,
    snippets, labels, and scores below are fictional but plausible examples of
    the framework's workflow; they are not measurements reported by the paper.
  scenarios:
    - label: Reword a generation prompt
      file: Code generation · mock CodeLlama run
      pattern: semantic-preserving prompt rewrite
      thinking:
        - Loading a benchmark prompt and its reference solution…
        - Rephrasing the request without changing the programming task…
        - Generating five candidate solutions for each version…
        - Comparing both batches with ROUGE…
      output:
        - "# Same task, different wording"
        - "- Write a Python function to check whether a number is prime."
        - "+ Determine whether a given integer is prime in Python."
      verdictAnswer: MEMORIZATION SIGNAL
      verdictLabel: "Mock ROUGE 0.96 → 0.37 · sensitivity 0.59"
      verdictKind: memorized
      explanation: >-
        In this simulated run, the model performs well on the original wording
        but degrades after a harmless rewrite. The UI presents the kind of
        sensitivity CodeLLM-Memo is designed to quantify, not a paper result.
    - label: Rename repair variables
      file: Program repair · mock CodeLlama run
      pattern: identifier obfuscation
      thinking:
        - Loading a buggy loop and its reference patch…
        - Renaming identifiers while preserving the off-by-one defect…
        - Asking the model to repair both versions…
        - Comparing patches with normalized compression distance…
      output:
        - "# Same off-by-one bug, identifiers renamed"
        - "- for (int i = 0; i <= n; i++)"
        - "+ for (int idx = 0; idx <= count; idx++)"
      verdictAnswer: MEMORIZATION SIGNAL
      verdictLabel: "Mock NCD similarity 0.93 → 0.34 · sensitivity 0.59"
      verdictKind: memorized
      explanation: >-
        The mock model repairs the familiar-looking instance but misses the
        renamed equivalent. This fictional contrast demonstrates how a
        perturbation can expose reliance on surface form.
    - label: Rephrase bubble sort
      file: Code generation · mock StarCoder run
      pattern: punctuation and wording change
      thinking:
        - Loading the original Java task…
        - Applying a minimal wording perturbation…
        - Generating both answers with identical settings…
        - Measuring the score difference…
      output:
        - "# Equivalent instructions"
        - "- Implement bubble sort in Java."
        - "+ Implement the bubble-sort algorithm in Java."
      verdictAnswer: STABLE
      verdictLabel: "Mock ROUGE 0.86 → 0.82 · sensitivity 0.04"
      verdictKind: learned
      explanation: >-
        Here the simulated score barely changes. It represents the opposite
        outcome: behavior consistent with a capability that survives a surface
        perturbation.
    - label: Rename summarization code
      file: Code summarization · mock CodeLlama run
      pattern: function and parameter renaming
      thinking:
        - Loading a small Java function…
        - Renaming the method and its parameters…
        - Generating summaries for both variants…
        - Comparing semantic overlap with the reference…
      output:
        - "# Same addition operation, renamed symbols"
        - "- public int add(int a, int b) { return a + b; }"
        - "+ public int sum(int x, int y) { return x + y; }"
      verdictAnswer: MEMORIZATION SIGNAL
      verdictLabel: "Mock ROUGE 0.90 → 0.45 · sensitivity 0.45"
      verdictKind: memorized
      explanation: >-
        The fictional score drop makes the intended interpretation tangible:
        a summary should remain stable when only names change, so a large drop
        would warrant closer inspection.
