name: CodeLLM-Memo
type: benchmark
area: LLMs for Software Engineering
logo: llm
description: >-
  A framework quantifying the memorization advantage of code LLMs via the
  Perturbation Sensitivity Hypothesis — measuring how model performance
  degrades under small, meaning-preserving prompt perturbations.
authors:
  - Djiré Albérick Euraste
  - Abdoul Kader Kaboré
  - Jordan Samhi
  - Earl Barr
  - Jacques Klein
  - Tegawendé F. Bissyandé
status: maintained
figure: codellm-memo.png
figureCaption: Memorization advantage example, impact of prompt perturbation on the outputs of StarCoder and CodeLlama (paper, Figure 2)
paper:
  title: "Quantifying Memorization Advantage in Code LLMs"
  venue: ICSE
  year: 2026
  url: https://conf.researchr.org/details/icse-2026/icse-2026-research-track/37/Quantifying-Memorization-Advantage-in-Code-LLMs
links:
  github: https://github.com/Berickal/CodeLLM_Memo
tags:
  - llm
  - memorization
  - code-generation
  - benchmarks
demo:
  style: terminal
  outputLabel: Documented behavior
  countOutput: false
  intro: >-
    CodeLLM-Memo tests the Perturbation Sensitivity Hypothesis by applying
    meaning-preserving perturbations and comparing model performance before and
    after the change. These examples expose the repository's documented command
    line workflow without presenting simulated model results.
  note: >-
    Commands are copied from the official repository README. They are shown as
    reproducible entry points and are not executed by this website; no model
    output or evaluation score is fabricated.
  scenarios:
    - label: End-to-end code-generation pipeline
      query: python pipeline.py --task code_generation --model codellama --output output --metric ncd --iter 3
      thinking:
        - The repository README documents pipeline.py as the end-to-end entry point.
        - This command selects code generation, CodeLlama, three iterations and normalized compression distance.
      output:
        - "Official README command — not executed by this website."
        - "Run it locally after installing the repository requirements and configuring the required model runtime."
      explanation: >-
        The command delegates dataset preparation, perturbation, generation and
        evaluation to the official pipeline. Results depend on the chosen local
        datasets and models, so this catalog does not predict them.
    - label: Load the XLCoST benchmark
      query: python data/load_dataset.py --dataset xlcost --output output/xlcost
      thinking:
        - The repository README also documents each pipeline stage separately.
        - This first stage selects XLCoST and the output/xlcost destination.
      output:
        - "Official README command — not executed by this website."
        - "It prepares the selected dataset under output/xlcost."
      explanation: >-
        Dataset preparation can be run independently before generation and
        evaluation, exactly as documented by the project.
    - label: Generate three CodeLlama iterations
      query: python generation.py --model codellama --folder output/xlcost --task code_generation --output gen/xlcost --iteration 3
      thinking:
        - This stage consumes the prepared XLCoST folder.
        - It requests the code-generation task, CodeLlama and three iterations.
      output:
        - "Official README command — not executed by this website."
        - "The requested output destination is gen/xlcost."
      explanation: >-
        Generation is exposed as a separate official command so researchers can
        inspect or reuse its outputs before evaluation.
    - label: Evaluate generated outputs with NCD
      query: python evaluation.py --folder gen/ --metric ncd --output xlcost_codellama
      thinking:
        - This stage points the evaluator at the generated-output folder.
        - It selects normalized compression distance and the documented output name.
      output:
        - "Official README command — not executed by this website."
        - "Exact scores are produced only by a real local run."
      explanation: >-
        The catalog deliberately reports no precomputed score for this command;
        model, dataset and runtime choices determine the result.
