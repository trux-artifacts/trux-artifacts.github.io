demo:
  style: terminal
  intro: >-
    Pick an app. Archer resolves conditional implicit calls, adds the missing
    call-graph edges, and â crucially â extracts the constraints under which
    each implicit call fires.
  outputLabel: Archer output
  countOutput: false
  note: >-
    The Scylla case is real, unmodified output reproduced from the paper. The
    two shorter cases are Simulated previews using representative fictional
    inputs, constraints and counts; they are not paper measurements. Nothing
    runs in the browser â run Archer from the repository for real APKs.
