name: Archer
type: tool
area: Android Static & Dynamic Analysis
description: >-
  Resolves conditional implicit calls in Android apps (e.g., Thread.start()
  triggering run(), or constraint-guarded JobScheduler executions) to make
  the call graphs of static and dynamic analyzers more sound.
