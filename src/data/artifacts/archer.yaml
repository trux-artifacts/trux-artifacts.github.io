        (onStartJob) kept alive periodically (2000 ms), persistently, and only
        on a given network type â conditional targets a standard call graph
        never reaches.
    - label: Periodic JobScheduler callback (simulated)
      query: java -jar Archer/target/Archer-1.0-jar-with-dependencies.jar -p platforms/ -a lab.shopping.apk -t -r -c SPARK
      thinking:
        - Building the SPARK call graph for the fictional APKâĶ
        - Matching JobScheduler executor and callback methodsâĶ
        - Recovering builder constraints from the scheduling callâĶ
        - Adding the conditional onStartJob edgeâĶ
      output:
        - 'Results:'
        - ' - App name: lab.shopping'
        - ' - Number of new Edges in call graph: 6'
        - ' - Number of new Nodes in call graph: 4'
        - ' - Number of extra statements covered: 137'
        - ' - Reached timeout: no'
        - ' - Conditional implicit call:'
        - '   executor: <lab.shopping.SyncManager: void scheduleSync()>'
        - '   call: JobScheduler.schedule(JobInfo)'
        - '   target: lab.shopping.SyncService.onStartJob'
        - '   constraints: periodic=3600000L Â· networkType=UNMETERED Â· persisted=true'
      explanation: >-
        This fictional preview shows Archer connecting schedule() to the
        framework-triggered onStartJob() callback while retaining the hourly,
        unmetered-network and persistence conditions that control execution.
    - label: Fixed-delay executor callback (simulated)
