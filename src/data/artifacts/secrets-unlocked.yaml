name: Secrets Unlocked
type: tool
area: Android Security & Malware
description: >-
  An LLM-based pipeline showing that off-the-shelf LLMs can automatically
  detect secrets embedded in Android apps (API keys, tokens, credentials) —
  rediscovering 93% of known secrets and thousands of additional valid ones.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: secretloc.png
figureCaption: Overview of the LLM-based pipeline for detecting embedded secrets in Android apps (ISSTA 2026 paper, Figure 1)
paper:
  title: "Secrets Unlocked: Evaluating LLMs for Secrets Detection in Android Apps"
  venue: ISSTA
  year: 2026
  url: https://jordansamhi.com/static/files/papers/secretloc.pdf
links:
  github: https://github.com/MarcoAlecci/LLMforAndroidSecrets
  website: https://conf.researchr.org/track/issta-2026/issta-2026-research-papers
tags:
  - android
  - secrets
  - llm
  - security
demo:
  style: terminal
  intro: >-
    The public artifact provides experiments.ipynb and released test data for
    inspecting the Secrets Unlocked pipeline.
  outputLabel: Documented workflow
  countOutput: false
  note: >-
    This preview points to the released notebook without presenting a synthetic
    credential or a simulated LLM classification as an experimental result.
    Nothing runs in the browser.
  scenarios:
    - label: Open the released experiments
      query: jupyter notebook experiments.ipynb
      thinking:
        - Load the notebook from the official artifact repository.
        - Configure the required local model and data paths.
        - Run the documented cells on the released test data.
      output:
        - "Released notebook entry point — not executed by this website."
        - "Candidate secrets and classifications must come from an actual configured run."
      explanation: >-
        The notebook exposes the artifact's extraction and LLM evaluation
        workflow. Provider, scope, validity and exploitability still require
        contextual validation before any security or disclosure claim.
