name: Secrets Unlocked
type: tool
area: Android Security & Malware
description: >-
  An LLM-based pipeline showing that off-the-shelf LLMs can automatically
  detect secrets embedded in Android apps (API keys, tokens, credentials) —
  rediscovering 93% of known secrets and thousands of additional valid ones.
