name: Secrets Unlocked
type: tool
area: Android Security & Malware
description: >-
  An LLM-based pipeline showing that off-the-shelf LLMs can automatically
  detect secrets embedded in Android apps (API keys, tokens, credentials) —
  rediscovering 93% of known secrets and thousands of additional valid ones.
cardDescription: Detects API keys, tokens, and credentials embedded in Android apps using LLMs.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
addedAt: '2026-07-07'
logo: android
figure: secretloc.png
figureCaption: Overview of the LLM-based pipeline for detecting embedded secrets in Android apps (ISSTA 2026 paper, Figure 1)
paper:
  title: "Secrets Unlocked: Evaluating LLMs for Secrets Detection in Android Apps"
  venue: ISSTA
  year: 2026
  url: https://jordansamhi.com/static/files/papers/secretloc.pdf
links:
  github: https://github.com/MarcoAlecci/LLMforAndroidSecrets
  website: https://conf.researchr.org/track/issta-2026/issta-2026-research-papers
tags:
  - android
  - secrets
  - llm
  - security
demo:
  style: terminal
  intro: >-
    Choose a fictional Android app and watch a SecretLoc-style scan unfold:
    strings are extracted, candidates are identified, then the mock LLM assigns
    a credential type and a review priority.
  outputLabel: Simulated SecretLoc output
  countOutput: false
  note: >-
    Interactive mock preview — the APK names, masked values, counts and verdicts
    below are fictional and are not results reported by the paper. The sequence
    mirrors the released notebook workflow; no live APK, credential or model is
    used in the browser.
  scenarios:
    - label: Database credential
      query: secretloc scan samples/atlas-shop.apk --redact
      thinking:
        - Decompiling resources and bytecode…
        - Extracting strings.xml values and code literals…
        - Ranking high-entropy credential candidates…
        - Asking the classifier for a credential type…
      output:
        - "SecretLoc mock run — completed"
        - "APK: io.demo.atlas.shop (fictional)"
        - "Strings inspected: 18,742"
        - "Candidates retained: 1"
        - "source:  classes3.dex · DatabaseConfig.<clinit>()"
        - "value:   db_prod_u****:M****au43@db.example.invalid"
        - "type:    DATABASE_CREDENTIAL"
        - "review:  high — server-side credential embedded in client code"
      verdictAnswer: EXPOSED
      verdictLabel: Database credential · simulated
      verdictKind: incorrect
      explanation: >-
        The mock pipeline recognizes a username/password pair inside a database
        URI. A real analyst would verify whether the endpoint is reachable,
        rotate the credential, and move authentication behind a backend.
    - label: LLM provider key
      query: secretloc scan samples/notewise-ai.apk --redact
      thinking:
        - Decompiling resources and bytecode…
        - Matching provider-specific key prefixes…
        - Checking surrounding code for API usage…
        - Classifying the masked candidate…
      output:
        - "SecretLoc mock run — completed"
        - "APK: ai.demo.notewise (fictional)"
        - "Strings inspected: 9,106"
        - "Candidates retained: 1"
        - "source:  classes2.dex · LegacySummarizer"
        - "value:   sk-ant-api03-****-DEMO-****"
        - "type:    ANTHROPIC_API_KEY"
        - "review:  high — provider key referenced by request builder"
      verdictAnswer: EXPOSED
      verdictLabel: Provider API key · simulated
      verdictKind: incorrect
      explanation: >-
        Prefix and code context make this look like a provider credential rather
        than an arbitrary token. The fictional value is intentionally invalid;
        a real finding would still need provider-side validity and scope checks.
    - label: Public mobile key
      query: secretloc scan samples/fit-track.apk --redact
      thinking:
        - Extracting resource strings…
        - Detecting a key-shaped value…
        - Inspecting manifest metadata and call sites…
        - Estimating whether secrecy is expected…
      output:
        - "SecretLoc mock run — completed"
        - "APK: health.demo.fittrack (fictional)"
        - "Strings inspected: 12,804"
        - "Candidates retained: 1"
        - "source:  res/values/strings.xml"
        - "value:   pk_mobile_DEMO_****"
        - "type:    PUBLIC_API_KEY"
        - "review:  low — client identifier with backend-enforced scope"
      verdictAnswer: REVIEWED
      verdictLabel: Public identifier · simulated
      verdictKind: correct
      explanation: >-
        Not every key-shaped string is secret. This scenario demonstrates the
        contextual review step: a deliberately public client identifier should
        not be reported with the severity of a private credential.
    - label: Payment secret
      query: secretloc scan samples/quickpay-wallet.apk --redact
      thinking:
        - Scanning XML resources and native string tables…
        - Detecting a payment-provider secret prefix…
        - Tracing the value into an authorization header…
        - Assigning remediation priority…
      output:
        - "SecretLoc mock run — completed"
        - "APK: pay.demo.quickwallet (fictional)"
        - "Strings inspected: 21,337"
        - "Candidates retained: 1"
        - "source:  res/values/keys.xml"
        - "value:   sk_live_DEMO_****_INVALID"
        - "type:    STRIPE_SECRET_KEY"
        - "review:  critical — private payment key used client-side"
      verdictAnswer: CRITICAL
      verdictLabel: Payment credential · simulated
      verdictKind: incorrect
      explanation: >-
        A private payment key should never ship in an APK. The value shown is a
        non-working mock; a real response would revoke it immediately and route
        privileged payment operations through a trusted server.
    - label: Email service bundle
      query: secretloc scan samples/campaign-mailer.apk --redact
      thinking:
        - Grouping nearby credential-like strings…
        - Correlating username, password and endpoint call sites…
        - Classifying the credential bundle…
        - Producing a prioritized review item…
      output:
        - "SecretLoc mock run — completed"
        - "APK: crm.demo.campaignmailer (fictional)"
        - "Strings inspected: 15,490"
        - "Candidates retained: 3 related values"
        - "username: demo_sender"
        - "password: S****GRID-DEMO-INVALID"
        - "endpoint: https://api.sendgrid.com/v3/mail/send"
        - "type:     EMAIL_SERVICE_CREDENTIALS"
        - "review:   high — complete client-side credential bundle"
      verdictAnswer: EXPOSED
      verdictLabel: Credential bundle · simulated
      verdictKind: incorrect
      explanation: >-
        Related values become more informative when analyzed together. This mock
        shows how a username, password-like string and provider endpoint can be
        grouped into one actionable review item.
