name: Secrets Unlocked
type: tool
area: Android Security & Malware
description: >-
  An LLM-based pipeline showing that off-the-shelf LLMs can automatically
  detect secrets embedded in Android apps (API keys, tokens, credentials) —
  rediscovering 93% of known secrets and thousands of additional valid ones.
authors:
  - Marco Alecci
  - Jordan Samhi
  - Tegawendé F. Bissyandé
  - Jacques Klein
status: maintained
logo: android
figure: secretloc.png
figureCaption: Overview of the LLM-based pipeline for detecting embedded secrets in Android apps (ISSTA 2026 paper, Figure 1)
paper:
  title: "Secrets Unlocked: Evaluating LLMs for Secrets Detection in Android Apps"
  venue: ISSTA
  year: 2026
  url: https://jordansamhi.com/static/files/papers/secretloc.pdf
links:
  github: https://github.com/MarcoAlecci/LLMforAndroidSecrets
tags:
  - android
  - secrets
  - llm
  - security
demo:
  style: terminal
  intro: >-
    Pick a real-world app: SecretLoc extracts its strings, then uses an LLM to
    detect and classify embedded secrets. Each case below was reported to the
    developers, who confirmed the finding.
  outputLabel: SecretLoc output
  countOutput: false
  note: >-
    Precomputed examples from real apps, with the secret values anonymized — no
    real secret is exposed and nothing runs in your browser. Run SecretLoc from
    the repository to analyze your own APKs.
  scenarios:
    - label: Database credential
      query: java -jar secretloc.jar -a com.shopfast.retail.apk
      thinking:
        - Extracting strings from strings.xml with ApkTool…
        - Extracting string literals from the bytecode…
        - Identifying candidate secrets (LLM)…
        - Classifying each candidate (LLM)…
      output:
        - "SecretLoc — analysis completed"
        - "- 1 secret classified (code):"
        - "    value: M****au43***********"
        - "    type:  DATABASE_CREDENTIAL"
      explanation: >-
        A database credential hardcoded in the app. During responsible
        disclosure the developer replied: "I confirm that the string you found
        corresponds to a database credential." Anyone decompiling the app could
        read it and reach the database directly.
    - label: LLM provider key
      query: java -jar secretloc.jar -a com.notewise.ai.apk
      thinking:
        - Extracting strings from strings.xml with ApkTool…
        - Extracting string literals from the bytecode…
        - Identifying candidate secrets (LLM)…
        - Classifying each candidate (LLM)…
      output:
        - "SecretLoc — analysis completed"
        - "- 1 secret classified (code):"
        - "    value: sk-ant-api03-AGJ0lgym********UOW2IZObJox***************wQFwodB8fihN7N*******75hLS-2N65fQXuX2Q-WXnTsQAA"
        - "    type:  ANTHROPIC_API_KEY"
      explanation: >-
        An Anthropic API key left in legacy code. The developer answered: "there
        was some legacy code in the app that was exposing an anthropic key.
        Thank you for bringing it to my attention." A leaked LLM key lets anyone
        bill requests to the developer's account.
    - label: Public API key
      query: java -jar secretloc.jar -a com.fittracker.pro.apk
      thinking:
        - Extracting strings from strings.xml with ApkTool…
        - Extracting string literals from the bytecode…
        - Identifying candidate secrets (LLM)…
        - Classifying each candidate (LLM)…
      output:
        - "SecretLoc — analysis completed"
        - "- 1 secret classified (code):"
        - "    value: 2e3c******b216181d***********c5be9f8b21618*********3db86b"
        - "    type:  PUBLIC_API_KEY"
      explanation: >-
        SecretLoc flagged a high-entropy token, but the developer clarified it
        is a public API key — the same for all installations, used only to
        verify requests to their backend, not a sensitive secret. A useful
        reminder that not every detected key is exploitable: the tool surfaces
        candidates, and context confirms severity.
    - label: Payment secret key
      query: java -jar secretloc.jar -a com.quickpay.wallet.apk
      thinking:
        - Extracting strings from strings.xml with ApkTool…
        - Extracting string literals from the bytecode…
        - Identifying candidate secrets (LLM)…
        - Classifying each candidate (LLM)…
      output:
        - "SecretLoc — analysis completed"
        - "- 1 secret classified (strings.xml):"
        - "    value: sk_live_Q***tD*****gjQK***Qfh"
        - "    type:  STRIPE_SECRET_KEY"
      explanation: >-
        A live Stripe secret key (sk_live_…) — a payment credential that can move
        real money. The developer confirmed: "both the Stripe and Facebook
        secrets you mentioned were from an old, inactive setup. These
        credentials have now been fully revoked and replaced."
    - label: Email service credentials
      query: java -jar secretloc.jar -a com.mailblast.crm.apk
      thinking:
        - Extracting strings from strings.xml with ApkTool…
        - Extracting string literals from the bytecode…
        - Identifying candidate secrets (LLM)…
        - Classifying each candidate (LLM)…
      output:
        - "SecretLoc — analysis completed"
        - "- 3 secrets classified (strings.xml):"
        - "    value: AhhTul_45X*                              type: SENDGRID_PASSWORD"
        - "    value: PeterCKoilt                              type: SENDGRID_USERNAME"
        - "    value: https://api.sendgrid.com/api/mail.send.json   type: SENDGRID_ENDPOINT"
      explanation: >-
        A full set of SendGrid email credentials — username, password, and
        endpoint — hardcoded together in strings.xml. Combined, they let anyone
        send email through the developer's SendGrid account, enabling spam or
        phishing under their identity.
